name: Vocabulary lesson CI

on:
  push:
    branches:
      - main
      - codex/015-vocabulary-lesson
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test

  webkit-viewport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps webkit
      - run: npm run test:viewport
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-015-viewport-screenshots
          path: test-results/*.png
          if-no-files-found: ignore
