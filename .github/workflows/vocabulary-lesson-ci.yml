name: Vocabulary lesson CI

on:
  push:
    branches:
      - main
      - codex/015-vocabulary-lesson
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - name: Run unit tests
        run: |
          mkdir -p test-results
          npm test > test-results/unit.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-016-unit-log
          path: test-results/unit.log
          if-no-files-found: warn

  webkit-viewport:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.55.0-noble
    steps:
      - uses: actions/checkout@v4
      - run: npm install --silent
      - run: npm run test:viewport
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-016-viewport-screenshots
          path: test-results/*.png
          if-no-files-found: ignore
