<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>专项小游戏预览</title>
  <style>
    :root {
      --paper: #fffdf8;
      --paper-line: #e8d9c0;
      --ink: #394456;
      --muted: #7a8492;
      --blue: #dff0ff;
      --blue-strong: #5d91c6;
      --pink: #ffe8f1;
      --yellow: #fff3c8;
      --green: #e4f8ea;
      --purple: #f0e9ff;
      --border: #eadfd2;
      --shadow: 0 10px 26px rgba(78, 62, 43, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.42)),
        repeating-linear-gradient(0deg, #fffaf1 0 31px, #f5e7cf 32px 33px);
    }

    .preview {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .preview-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .mode-note {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .paper-list {
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255,205,205,.5) 0 2px, transparent 2px 100%) 52px 0 / 100% 100%,
        repeating-linear-gradient(0deg, var(--paper) 0 35px, var(--paper-line) 36px 37px);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .paper-row {
      width: 100%;
      min-height: 38px;
      display: grid;
      grid-template-columns: 54px 1fr 28px;
      align-items: center;
      border: none;
      background: transparent;
      color: var(--ink);
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }

    .paper-row:active { background: rgba(255, 232, 241, .45); }

    .page-no {
      text-align: center;
      color: #a36475;
      font-size: 13px;
      font-weight: 900;
    }

    .paper-name {
      min-width: 0;
      font-size: 15px;
      font-weight: 850;
      padding-top: 2px;
    }

    .paper-more {
      color: #a7a0a0;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .quiz-shell {
      min-height: calc(100dvh - 122px);
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--blue);
      border-bottom: 1px solid #cfe4f6;
    }

    .quiz-title {
      font-size: 18px;
      font-weight: 900;
      color: #2e6798;
    }

    button {
      border: none;
      border-radius: 999px;
      min-height: 36px;
      padding: 0 13px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 850;
      color: #465165;
      background: #fff;
      box-shadow: 0 3px 10px rgba(54, 76, 96, .1);
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active { transform: scale(.97); }

    .stage {
      min-height: 0;
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 76px;
      gap: 10px;
      padding: 10px;
    }

    .side-action {
      align-self: stretch;
      border-radius: 8px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 16px;
      color: #315c00;
      background: linear-gradient(180deg, #e8ff66, #b8f527);
    }

    .side-action.check {
      color: #8a1f4c;
      background: linear-gradient(180deg, #ffe6f0, #ffc8dc);
    }

    .board {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .word-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      overflow: hidden;
      padding: 6px;
      border: 2px dashed #dfcfc0;
      border-radius: 8px;
      background: rgba(255,253,248,.86);
      min-height: 46px;
      align-items: center;
    }

    .word-strip.over { background: #fff7df; }

    .word {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      min-height: 30px;
      padding: 5px 8px;
      border: 1px solid #ecd89d;
      border-radius: 999px;
      background: linear-gradient(180deg, #fffbea, var(--yellow));
      color: #5f553e;
      font-size: 14px;
      font-weight: 950;
      cursor: grab;
      user-select: none;
    }

    .word small {
      max-width: 30px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #8a8068;
      font-size: 9px;
      font-weight: 750;
    }

    .word.selected {
      outline: 3px solid #b9d9ff;
      background: #eef7ff;
    }

    .word.correct { background: #dff7df; border-color: #90cc91; }
    .word.incorrect { background: #ffdede; border-color: #ee9c9c; }

    .bins {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .bin {
      min-width: 0;
      min-height: 154px;
      border: 2px dashed #decfc5;
      border-radius: 8px;
      padding: 9px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 5px;
      background: #fff;
    }

    .bin:nth-child(1) { background: var(--pink); }
    .bin:nth-child(2) { background: #fff1de; }
    .bin:nth-child(3) { background: var(--green); }
    .bin:nth-child(4) { background: var(--purple); }
    .bin.over { border-color: var(--blue-strong); }

    .bin-title {
      font-size: 15px;
      font-weight: 950;
      color: #555165;
      line-height: 1.2;
    }

    .bin-rule {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.35;
    }

    .bin-content {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 6px;
      min-height: 58px;
      overflow-y: auto;
    }

    .result {
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f8fbff;
      color: #526070;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.45;
    }

    .result.good { background: #e9f9ed; color: #326a3e; }
    .result.warn { background: #fff1f1; color: #8b3f3f; }

    @media (orientation: portrait) {
      .mode-note::after { content: " · 横屏预览更接近目标效果"; }
      .quiz-shell { min-height: auto; }
      .stage {
        grid-template-columns: 1fr;
        grid-template-areas:
          "board"
          "actions";
      }
      .board { grid-area: board; }
      .side-action {
        writing-mode: horizontal-tb;
        min-height: 42px;
      }
      .stage > .side-action:first-child { grid-area: actions; width: calc(50% - 5px); justify-self: start; }
      .stage > .side-action.check { grid-area: actions; width: calc(50% - 5px); justify-self: end; }
      .bins { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .bin { min-height: 138px; }
    }

    @media (max-width: 560px) {
      .preview { padding: 10px; }
      h1 { font-size: 19px; }
      .mode-note { font-size: 12px; white-space: normal; text-align: right; }
      .paper-row { min-height: 36px; grid-template-columns: 46px 1fr 24px; }
      .paper-list {
        background:
          linear-gradient(90deg, rgba(255,205,205,.5) 0 2px, transparent 2px 100%) 46px 0 / 100% 100%,
          repeating-linear-gradient(0deg, var(--paper) 0 35px, var(--paper-line) 36px 37px);
      }
      .quiz-top { padding: 9px 10px; }
      .quiz-title { font-size: 16px; }
      button { min-height: 34px; padding: 0 10px; font-size: 12px; }
      .word { font-size: 13px; min-height: 28px; padding: 4px 7px; }
      .bin-title { font-size: 14px; }
      .bin-rule { font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="preview">
    <div class="preview-title">
      <h1>专项小游戏预览</h1>
      <div class="mode-note">独立 HTML 预览</div>
    </div>

    <section class="paper-list" aria-label="专项小游戏目录">
      <button class="paper-row" type="button">
        <span class="page-no">01</span>
        <span class="paper-name">三单变位分类</span>
        <span class="paper-more">›</span>
      </button>
      <button class="paper-row" type="button">
        <span class="page-no">02</span>
        <span class="paper-name">后续专项小游戏占位</span>
        <span class="paper-more">›</span>
      </button>
    </section>

    <section class="quiz-shell" aria-label="三单变位分类预览">
      <div class="quiz-top">
        <div class="quiz-title">三单变位分类</div>
      </div>

      <div class="stage">
        <button class="side-action" type="button" onclick="newRound()">换一组词</button>

        <div class="board">
          <div id="wordBank" class="word-strip" aria-label="单词条"></div>

          <div class="bins">
            <div class="bin" data-type="s">
              <div class="bin-title">直接 + s</div>
              <div class="bin-rule">大多数动词<br>like → likes</div>
              <div class="bin-content"></div>
            </div>
            <div class="bin" data-type="es">
              <div class="bin-title">加 es</div>
              <div class="bin-rule">s / x / ch / sh / o<br>watch → watches</div>
              <div class="bin-content"></div>
            </div>
            <div class="bin" data-type="ies">
              <div class="bin-title">去 y 变 ies</div>
              <div class="bin-rule">辅音字母 + y<br>study → studies</div>
              <div class="bin-content"></div>
            </div>
            <div class="bin" data-type="special">
              <div class="bin-title">特殊变化</div>
              <div class="bin-rule">have → has<br>be → is</div>
              <div class="bin-content"></div>
            </div>
          </div>

          <div id="result" class="result">把上面的单词拖到分类里，或先点单词再点分类区。</div>
        </div>

        <button class="side-action check" type="button" onclick="checkAnswer()">检查答案</button>
      </div>
    </section>
  </main>

  <script>
    const words = [
      { base: 'like', third: 'likes', cn: '喜欢', type: 's' },
      { base: 'play', third: 'plays', cn: '玩', type: 's' },
      { base: 'read', third: 'reads', cn: '读', type: 's' },
      { base: 'eat', third: 'eats', cn: '吃', type: 's' },
      { base: 'run', third: 'runs', cn: '跑', type: 's' },
      { base: 'speak', third: 'speaks', cn: '说', type: 's' },
      { base: 'open', third: 'opens', cn: '打开', type: 's' },
      { base: 'go', third: 'goes', cn: '去', type: 'es' },
      { base: 'do', third: 'does', cn: '做', type: 'es' },
      { base: 'watch', third: 'watches', cn: '看', type: 'es' },
      { base: 'wash', third: 'washes', cn: '洗', type: 'es' },
      { base: 'teach', third: 'teaches', cn: '教', type: 'es' },
      { base: 'study', third: 'studies', cn: '学习', type: 'ies' },
      { base: 'try', third: 'tries', cn: '尝试', type: 'ies' },
      { base: 'fly', third: 'flies', cn: '飞', type: 'ies' },
      { base: 'cry', third: 'cries', cn: '哭', type: 'ies' },
      { base: 'have', third: 'has', cn: '有', type: 'special' },
      { base: 'be', third: 'is', cn: '是', type: 'special' },
      { base: 'am', third: 'is', cn: '是', type: 'special' },
      { base: 'are', third: 'is', cn: '是', type: 'special' }
    ];

    let currentWords = [];
    let selectedCard = null;

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function makeCard(item) {
      const card = document.createElement('div');
      card.className = 'word';
      card.draggable = true;
      card.dataset.type = item.type;
      card.dataset.base = item.base;
      card.dataset.third = item.third;
      card.dataset.cn = item.cn;
      card.innerHTML = `${item.base}<small>${item.cn}</small>`;

      card.addEventListener('dragstart', event => {
        event.dataTransfer.setData('text/plain', item.base);
        selectedCard = card;
      });

      card.addEventListener('dragend', () => {
        document.querySelectorAll('.over').forEach(el => el.classList.remove('over'));
      });

      card.addEventListener('click', () => {
        document.querySelectorAll('.word').forEach(word => word.classList.remove('selected'));
        selectedCard = card;
        card.classList.add('selected');
      });

      return card;
    }

    function renderWords() {
      const bank = document.getElementById('wordBank');
      bank.innerHTML = '';
      currentWords.forEach(item => bank.appendChild(makeCard(item)));
      document.querySelectorAll('.bin-content').forEach(content => { content.innerHTML = ''; });
      selectedCard = null;
      setResult('把上面的单词拖到分类里，或先点单词再点分类区。');
    }

    function moveSelectedTo(target) {
      if (!selectedCard) return;
      target.appendChild(selectedCard);
      selectedCard.classList.remove('selected');
      selectedCard = null;
    }

    function setupDropZone(zone, targetSelector) {
      zone.addEventListener('dragover', event => {
        event.preventDefault();
        zone.classList.add('over');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('over'));
      zone.addEventListener('drop', event => {
        event.preventDefault();
        zone.classList.remove('over');
        const target = targetSelector ? zone.querySelector(targetSelector) : zone;
        moveSelectedTo(target);
      });
      zone.addEventListener('click', event => {
        if (event.target.classList.contains('word')) return;
        const target = targetSelector ? zone.querySelector(targetSelector) : zone;
        moveSelectedTo(target);
      });
    }

    function setupInteractions() {
      document.querySelectorAll('.bin').forEach(bin => setupDropZone(bin, '.bin-content'));
      setupDropZone(document.getElementById('wordBank'), null);
    }

    function newRound() {
      const s = shuffle(words.filter(word => word.type === 's')).slice(0, 2);
      const es = shuffle(words.filter(word => word.type === 'es')).slice(0, 2);
      const ies = shuffle(words.filter(word => word.type === 'ies')).slice(0, 2);
      const special = shuffle(words.filter(word => word.type === 'special')).slice(0, 2);
      currentWords = shuffle([...s, ...es, ...ies, ...special]);
      renderWords();
    }

    function checkAnswer() {
      let right = 0;
      const mistakes = [];
      document.querySelectorAll('.word').forEach(card => {
        card.classList.remove('correct', 'incorrect');
        const bin = card.closest('.bin');
        if (!bin) {
          card.classList.add('incorrect');
          mistakes.push(`${card.dataset.base} 还没分类`);
          return;
        }
        if (bin.dataset.type === card.dataset.type) {
          card.classList.add('correct');
          right++;
        } else {
          card.classList.add('incorrect');
          mistakes.push(`${card.dataset.base} 应放到「${typeName(card.dataset.type)}」`);
        }
      });

      if (right === currentWords.length) {
        setResult(`全部正确：${right} / ${currentWords.length}`, 'good');
      } else {
        setResult(`正确：${right} / ${currentWords.length}。${mistakes.join('；')}`, 'warn');
      }
    }

    function setResult(text, state = '') {
      const result = document.getElementById('result');
      result.className = `result ${state}`.trim();
      result.textContent = text;
    }

    function typeName(type) {
      return {
        s: '直接 + s',
        es: '加 es',
        ies: '去 y 变 ies',
        special: '特殊变化'
      }[type];
    }

    setupInteractions();
    newRound();
  </script>
</body>
</html>
