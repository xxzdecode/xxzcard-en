<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>专项练习通用骨架</title>

  <style>
    :root {
      --page-bg: #fff4f7;
      --panel-bg: #fffdfc;
      --title: #e88fa3;
      --mint: #a8d8c8;
      --mint-deep: #5f9f8c;
      --mint-soft: #dff3ea;
      --knowledge: #ffe9d6;
      --knowledge-border: #f0c79a;
      --correct: #d7f3dc;
      --correct-border: #94cfa0;
      --wrong: #ffe0d9;
      --wrong-border: #eaa693;
      --selected: #fff0f5;
      --selected-border: #f3b6c7;
      --text: #625b63;
      --muted: #8a7f86;
      --line: #efdde4;
      --shadow: 0 10px 28px rgba(220, 170, 180, 0.16);

      /* 四个目标区：蓝 / 暖黄 / 青绿 / 浅紫，避免与知识条(杏黄)、按钮(薄荷绿)等撞色 */
      --target-1-bg: #eaf1fb;
      --target-1-border: #c7dcf3;
      --target-2-bg: #fff3c2;
      --target-2-border: #e8c765;
      --target-3-bg: #ddf5f1;
      --target-3-border: #7fc4bb;
      --target-4-bg: #f6f1f7;
      --target-4-border: #e2d3e4;

      --page-gap: 12px;
      --header-radius: 22px;
      --stage-radius: 24px;
      --feedback-height: 48px;
      --tap-min: 44px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Microsoft YaHei",
        Arial,
        sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: var(--tap-min);
      border: 0;
      border-radius: 999px;
      padding: 9px 16px;
      color: #fff;
      background: var(--mint);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(120, 183, 162, 0.2);
      transition:
        transform 0.12s ease,
        opacity 0.12s ease,
        box-shadow 0.12s ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:focus-visible,
    .demo-card:focus-visible,
    .demo-target:focus-visible {
      outline: 3px solid var(--selected-border);
      outline-offset: 2px;
    }

    button.secondary {
      color: var(--mint-deep);
      background: var(--mint-soft);
      box-shadow: none;
    }

    button.ghost {
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .practice-app {
      width: 100vw;
      height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) var(--feedback-height);
      gap: var(--page-gap);
      overflow: hidden;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.72), transparent 30%),
        linear-gradient(180deg, #fff7f9 0%, var(--page-bg) 100%);
    }

    /* ---------- 顶部紧凑区 ---------- */

    .practice-header {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(180px, auto) minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255, 253, 252, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--header-radius);
      box-shadow: var(--shadow);
    }

    .title-block {
      min-width: 0;
      display: flex;
      align-items: center;
      height: 100%;
    }

    .title-block h1 {
      margin: 0;
      color: var(--title);
      font-size: clamp(23px, 2.4vw, 32px);
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .knowledge-strip {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      gap: 6px;
      max-height: 72px;
      overflow: hidden;
    }

    .knowledge-chip {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--knowledge);
      border: 1px solid var(--knowledge-border);
      color: #7b6843;
      font-size: clamp(12px, 1.25vw, 15px);
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      white-space: nowrap;
    }

    .progress-pill {
      min-height: var(--tap-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--mint-deep);
      background: var(--mint-soft);
      font-weight: 900;
    }

    /* ---------- 核心练习台 ---------- */

    .practice-stage {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: var(--panel-bg);
      border: 1px solid var(--line);
      border-radius: var(--stage-radius);
      box-shadow: var(--shadow);
    }

    /*
      将下面的 .demo-layout 替换为具体玩法：
      - 分类题：左侧词卡区 + 右侧 2×2 分类区
      - 配对题：左右双列
      - 选择题：左题干 + 右选项
      - 排序题：上方素材 + 下方排序区

      保留 .practice-stage 外层即可。
    */

    .demo-layout {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(220px, 0.34fr) minmax(0, 0.66fr);
      gap: 12px;
      padding: 12px;
    }

    .demo-source,
    .demo-targets {
      min-width: 0;
      min-height: 0;
    }

    .demo-source {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: #fff8fb;
      border: 1px dashed #e8cfd9;
    }

    .section-title {
      margin: 0;
      font-size: clamp(16px, 1.6vw, 20px);
      color: #766c74;
    }

    .demo-card-grid {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(var(--tap-min), 1fr);
      gap: 8px;
    }

    .demo-card {
      min-width: 0;
      min-height: var(--tap-min);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border-radius: 15px;
      background: #f8e9f0;
      border: 2px solid transparent;
      color: #705f68;
      font-weight: 800;
      text-align: center;
      overflow-wrap: anywhere;
      cursor: pointer;
      user-select: none;
    }

    .demo-card.selected {
      background: var(--selected);
      border-color: var(--selected-border);
    }

    .demo-card.placed {
      opacity: 0.38;
      pointer-events: none;
    }

    .demo-targets {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .demo-target {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 6px;
      padding: 12px;
      border: 2px dashed var(--target-1-border);
      border-radius: 18px;
      background: var(--target-1-bg);
      cursor: pointer;
      overflow: hidden;
    }

    .demo-target:nth-child(2) {
      background: var(--target-2-bg);
      border-color: var(--target-2-border);
    }

    .demo-target:nth-child(3) {
      background: var(--target-3-bg);
      border-color: var(--target-3-border);
    }

    .demo-target:nth-child(4) {
      background: var(--target-4-bg);
      border-color: var(--target-4-border);
    }

    .demo-target h2 {
      margin: 0;
      color: var(--text);
      font-size: clamp(16px, 1.6vw, 20px);
    }

    .demo-target p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(11px, 1.1vw, 14px);
      line-height: 1.45;
    }

    .target-content {
      min-width: 0;
      min-height: 0;
      display: flex;
      align-content: flex-start;
      flex-wrap: wrap;
      gap: 6px;
      overflow: hidden;
    }

    .placed-chip {
      max-width: 100%;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(130, 160, 148, 0.22);
      font-size: clamp(12px, 1.2vw, 14px);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    /* ---------- 底部固定反馈条 ---------- */

    .feedback-bar {
      min-width: 0;
      height: var(--feedback-height);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      border-radius: 18px;
      color: var(--text);
      background: #fffdfc;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .feedback-icon {
      font-size: 20px;
      line-height: 1;
    }

    .feedback-text {
      min-width: 0;
      font-size: clamp(13px, 1.35vw, 16px);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feedback-detail {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .feedback-bar.correct {
      background: var(--correct);
      border-color: var(--correct-border);
    }

    .feedback-bar.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
    }

    /* ---------- 规则弹层 ---------- */

    .rules-dialog {
      width: min(680px, calc(100vw - 30px));
      max-height: min(70dvh, 520px);
      padding: 0;
      border: 0;
      border-radius: 22px;
      color: var(--text);
      background: var(--panel-bg);
      box-shadow: 0 20px 60px rgba(120, 85, 100, 0.25);
      overflow: hidden;
    }

    .rules-dialog::backdrop {
      background: rgba(90, 70, 80, 0.22);
      backdrop-filter: blur(3px);
    }

    .rules-dialog header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff8fb;
    }

    .rules-dialog h2 {
      margin: 0;
      color: var(--title);
      font-size: 21px;
    }

    .rules-dialog .dialog-body {
      max-height: calc(min(70dvh, 520px) - 72px);
      padding: 16px;
      overflow: auto;
      line-height: 1.7;
    }

    .rules-dialog ul {
      margin: 0;
      padding-left: 1.4em;
    }

    /* ---------- 手机横屏紧凑模式 ---------- */

    @media (orientation: landscape) and (max-height: 520px) {
      :root {
        --page-gap: 7px;
        --feedback-height: 40px;
        --header-radius: 16px;
        --stage-radius: 18px;
        --tap-min: 38px;
      }

      .practice-app {
        padding:
          max(6px, env(safe-area-inset-top))
          max(7px, env(safe-area-inset-right))
          max(6px, env(safe-area-inset-bottom))
          max(7px, env(safe-area-inset-left));
      }

      .practice-header {
        grid-template-columns: minmax(145px, auto) minmax(0, 1fr) auto;
        gap: 7px;
        padding: 6px 8px;
      }

      .knowledge-strip {
        gap: 4px;
        max-height: 44px;
      }

      .knowledge-chip {
        min-height: 24px;
        padding: 3px 7px;
        font-size: 11px;
      }

      .header-actions {
        gap: 5px;
      }

      button,
      .progress-pill {
        min-height: 36px;
        padding: 6px 10px;
        font-size: 12px;
      }

      .demo-layout {
        grid-template-columns: minmax(185px, 0.32fr) minmax(0, 0.68fr);
        gap: 7px;
        padding: 7px;
      }

      .demo-source,
      .demo-target {
        padding: 8px;
        border-radius: 14px;
      }

      .demo-card-grid,
      .demo-targets {
        gap: 5px;
      }

      .demo-card {
        min-height: 34px;
        padding: 5px 7px;
        border-radius: 11px;
        font-size: 12px;
      }

      .demo-target {
        gap: 2px;
      }

      .demo-target h2 {
        font-size: 14px;
      }

      .demo-target p {
        font-size: 10px;
      }

      .placed-chip {
        padding: 3px 6px;
        font-size: 10px;
      }

      .feedback-bar {
        gap: 6px;
        padding: 4px 10px;
        border-radius: 13px;
      }

      .feedback-icon {
        font-size: 16px;
      }

      .feedback-text {
        font-size: 12px;
      }

      .feedback-detail {
        display: none;
      }
    }

    /* ---------- 手机系统仍为竖屏时：整体旋转兜底 ---------- */

    @media (orientation: portrait) and (max-width: 767px) {
      .practice-app {
        position: fixed;
        left: 0;
        top: 100dvh;
        width: 100dvh;
        height: 100vw;
        transform: rotate(-90deg);
        transform-origin: top left;
      }

      .rules-dialog {
        width: min(680px, calc(100dvh - 28px));
        max-height: calc(100vw - 24px);
      }
    }

    /* ---------- 大屏电脑仅保证正常显示 ---------- */

    @media (min-width: 1280px) {
      .practice-app {
        max-width: 1440px;
        margin: 0 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="practice-app" id="practiceApp">
    <header class="practice-header">
      <div class="title-block">
        <!-- 修改练习标题 -->
        <h1>专项练习标题</h1>
      </div>

      <!-- 修改为本练习真正需要长期显示的知识摘要 -->
      <div class="knowledge-strip" aria-label="知识点摘要">
        <span class="knowledge-chip">规则一｜简短说明</span>
        <span class="knowledge-chip">规则二｜简短说明</span>
        <span class="knowledge-chip">规则三｜简短说明</span>
        <span class="knowledge-chip">特殊｜示例</span>
      </div>

      <div class="header-actions">
        <div class="progress-pill" id="progressText" aria-live="polite">
          完成 0 / 8
        </div>
        <button class="secondary" type="button" id="rulesButton">
          查看规则
        </button>
        <button type="button" id="newRoundButton">
          换一组
        </button>
      </div>
    </header>

    <main class="practice-stage" aria-label="核心练习区">
      <!--
        ==================== 玩法替换区开始 ====================

        以下内容只是“点击词卡 → 点击分类区”的骨架演示。
        制作真实练习时，可以替换 .demo-layout 内部，但建议保留：
        - practice-stage 外层
        - 顶部 practice-header
        - 底部 feedback-bar
        - updateProgress()
        - showFeedback()
        - tryLandscapeMode()

        ==================== 玩法替换区开始 ====================
      -->
      <div class="demo-layout">
        <section class="demo-source" aria-labelledby="sourceTitle">
          <h2 class="section-title" id="sourceTitle">待操作内容</h2>

          <div class="demo-card-grid" id="cardGrid">
            <div class="demo-card" tabindex="0" role="button" data-type="a">词卡 1</div>
            <div class="demo-card" tabindex="0" role="button" data-type="b">词卡 2</div>
            <div class="demo-card" tabindex="0" role="button" data-type="c">词卡 3</div>
            <div class="demo-card" tabindex="0" role="button" data-type="d">词卡 4</div>
            <div class="demo-card" tabindex="0" role="button" data-type="a">词卡 5</div>
            <div class="demo-card" tabindex="0" role="button" data-type="b">词卡 6</div>
            <div class="demo-card" tabindex="0" role="button" data-type="c">词卡 7</div>
            <div class="demo-card" tabindex="0" role="button" data-type="d">词卡 8</div>
          </div>
        </section>

        <section class="demo-targets" aria-label="操作目标">
          <div class="demo-target" tabindex="0" role="button" data-type="a">
            <h2>目标 A</h2>
            <p>这里放简短规则。</p>
            <div class="target-content"></div>
          </div>

          <div class="demo-target" tabindex="0" role="button" data-type="b">
            <h2>目标 B</h2>
            <p>这里放简短规则。</p>
            <div class="target-content"></div>
          </div>

          <div class="demo-target" tabindex="0" role="button" data-type="c">
            <h2>目标 C</h2>
            <p>这里放简短规则。</p>
            <div class="target-content"></div>
          </div>

          <div class="demo-target" tabindex="0" role="button" data-type="d">
            <h2>目标 D</h2>
            <p>这里放简短规则。</p>
            <div class="target-content"></div>
          </div>
        </section>
      </div>
      <!-- ==================== 玩法替换区结束 ==================== -->
    </main>

    <footer class="feedback-bar" id="feedbackBar" aria-live="polite">
      <span class="feedback-icon" id="feedbackIcon">△</span>
      <span class="feedback-text" id="feedbackText">
        请选择一个词卡，再点击目标区域。
      </span>
      <span class="feedback-detail" id="feedbackDetail">
        核心操作应始终保持同屏。
      </span>
    </footer>
  </div>

  <dialog class="rules-dialog" id="rulesDialog">
    <header>
      <h2>详细规则</h2>
      <button class="ghost" type="button" id="closeRulesButton">关闭</button>
    </header>

    <div class="dialog-body">
      <!-- 修改为本练习的详细知识内容 -->
      <ul>
        <li>顶部知识条只放学生做题时需要随时查看的摘要。</li>
        <li>详细知识放在这里，不长期占用核心练习空间。</li>
        <li>内容较多时应拆成多个小回合，而不是让页面滚动。</li>
      </ul>
    </div>
  </dialog>

  <script>
    /*
      ==========================================================
      通用状态与辅助函数
      ==========================================================
    */

    const state = {
      selectedCard: null,
      completed: 0,
      total: 8
    };

    const progressText = document.getElementById("progressText");
    const feedbackBar = document.getElementById("feedbackBar");
    const feedbackIcon = document.getElementById("feedbackIcon");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackDetail = document.getElementById("feedbackDetail");
    const rulesDialog = document.getElementById("rulesDialog");

    function updateProgress(completed = state.completed, total = state.total) {
      state.completed = completed;
      state.total = total;
      progressText.textContent = `完成 ${completed} / ${total}`;
    }

    function showFeedback(type, message, detail = "") {
      feedbackBar.classList.remove("correct", "wrong");

      const config = {
        neutral: { icon: "△", className: "" },
        correct: { icon: "✓", className: "correct" },
        wrong: { icon: "×", className: "wrong" }
      };

      const current = config[type] || config.neutral;
      feedbackIcon.textContent = current.icon;
      feedbackText.textContent = message;
      feedbackDetail.textContent = detail;

      if (current.className) {
        feedbackBar.classList.add(current.className);
      }
    }

    async function tryLandscapeMode() {
      /*
        横屏锁定只作为增强功能：
        - 必须由用户点击触发
        - 失败后页面继续使用 CSS 旋转兜底
        - 不向学生显示技术错误
      */
      try {
        if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (_) {
        // 全屏失败不影响练习
      }

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape");
        }
      } catch (_) {
        // 横屏锁定失败不影响练习
      }
    }

    /*
      ==========================================================
      演示玩法：点击词卡 → 点击目标区
      制作真实练习时可整体替换本段。
      ==========================================================
    */

    function clearCardSelection() {
      document.querySelectorAll(".demo-card").forEach((card) => {
        card.classList.remove("selected");
      });
    }

    function selectCard(card) {
      if (card.classList.contains("placed")) return;

      clearCardSelection();
      state.selectedCard = card;
      card.classList.add("selected");

      showFeedback(
        "neutral",
        `已选择：${card.textContent}`,
        "请点击右侧目标区域。"
      );
    }

    function placeSelectedCard(target) {
      const card = state.selectedCard;

      if (!card) {
        showFeedback("wrong", "请先选择一个词卡。", "");
        return;
      }

      const isCorrect = card.dataset.type === target.dataset.type;

      if (!isCorrect) {
        showFeedback(
          "wrong",
          `${card.textContent} 不属于这个区域。`,
          "可以继续尝试。"
        );
        return;
      }

      const placedChip = document.createElement("span");
      placedChip.className = "placed-chip";
      placedChip.textContent = card.textContent;

      target.querySelector(".target-content").appendChild(placedChip);
      card.classList.remove("selected");
      card.classList.add("placed");
      card.setAttribute("aria-disabled", "true");

      state.selectedCard = null;
      updateProgress(state.completed + 1, state.total);

      if (state.completed === state.total) {
        showFeedback("correct", "全部完成！", "可以点击“换一组”重新开始。");
      } else {
        showFeedback(
          "correct",
          "放置正确。",
          `还剩 ${state.total - state.completed} 个。`
        );
      }
    }

    function resetDemo() {
      state.selectedCard = null;

      document.querySelectorAll(".demo-card").forEach((card) => {
        card.classList.remove("selected", "placed");
        card.removeAttribute("aria-disabled");
      });

      document.querySelectorAll(".target-content").forEach((box) => {
        box.innerHTML = "";
      });

      updateProgress(0, document.querySelectorAll(".demo-card").length);
      showFeedback(
        "neutral",
        "请选择一个词卡，再点击目标区域。",
        "核心操作应始终保持同屏。"
      );
    }

    function activateByKeyboard(event, callback) {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        callback();
      }
    }

    document.querySelectorAll(".demo-card").forEach((card) => {
      card.addEventListener("click", () => selectCard(card));
      card.addEventListener("keydown", (event) => {
        activateByKeyboard(event, () => selectCard(card));
      });
    });

    document.querySelectorAll(".demo-target").forEach((target) => {
      target.addEventListener("click", () => placeSelectedCard(target));
      target.addEventListener("keydown", (event) => {
        activateByKeyboard(event, () => placeSelectedCard(target));
      });
    });

    /*
      ==========================================================
      通用按钮
      ==========================================================
    */

    document.getElementById("newRoundButton").addEventListener("click", async () => {
      await tryLandscapeMode();
      resetDemo();
    });

    document.getElementById("rulesButton").addEventListener("click", () => {
      if (typeof rulesDialog.showModal === "function") {
        rulesDialog.showModal();
      } else {
        rulesDialog.setAttribute("open", "");
      }
    });

    document.getElementById("closeRulesButton").addEventListener("click", () => {
      rulesDialog.close();
    });

    rulesDialog.addEventListener("click", (event) => {
      if (event.target === rulesDialog) {
        rulesDialog.close();
      }
    });

    /*
      ==========================================================
      初始化
      ==========================================================
    */

    updateProgress(0, document.querySelectorAll(".demo-card").length);
  </script>
</body>
</html>
