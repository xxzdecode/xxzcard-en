  <script>
    (async () => {
      "use strict";
      const config = {"version":1,"title":"冠词｜上一课语法挑战","knowledge":["看发音：a / an","特指或再次提到：the","三餐、球类、科目：零冠词"],"completion":"语法挑战完成｜你完成了 10 题。判断冠词时，先看发音，再看是否特指，最后检查是否属于零冠词搭配。","round":{"size":10,"quotas":{"choice":4,"context":2,"correction":2,"multi":1,"order":1}},"scope":{"mode":"declared","allowedWords":[]},"questions":[{"id":"AR01","category":"choice","categoryLabel":"a / an｜看发音","type":"single","prompt":"Mia wants to be ___ engineer when she grows up.","options":["a","an","the","不填"],"answer":"an","wrongFeedback":"engineer 的开头读元音音素。","explanation":"engineer 以元音音素开头，所以用 an。"},{"id":"AR02","category":"choice","categoryLabel":"a / an｜易混发音","type":"single","prompt":"Leo is ___ university student.","options":["a","an","the","不填"],"answer":"a","wrongFeedback":"university 的开头读 /juː/，第一个音是辅音音素 /j/。","explanation":"university 虽然以字母 u 开头，但读音以辅音音素 /j/ 开头，所以用 a。"},{"id":"AR03","category":"choice","categoryLabel":"a / an｜不发音字母","type":"single","prompt":"We waited for ___ hour outside the museum.","options":["a","an","the","不填"],"answer":"an","wrongFeedback":"hour 中的 h 不发音，开头是元音音素。","explanation":"hour 的开头读元音音素，所以用 an。"},{"id":"AR04","category":"choice","categoryLabel":"a / an｜易混发音","type":"single","prompt":"Dad bought ___ useful tool for the garden.","options":["a","an","the","不填"],"answer":"a","wrongFeedback":"useful 的开头读 /juː/，不是元音音素开头。","explanation":"useful 以辅音音素 /j/ 开头，所以用 a。"},{"id":"AR05","category":"choice","categoryLabel":"the｜再次提到","type":"single","source":"I saw a small dog near the gate.","prompt":"___ dog followed me home.","options":["A","An","The","不填"],"answer":"The","wrongFeedback":"这只狗已经在上一句出现过。","explanation":"同一个事物再次提到时，用 the。"},{"id":"AR06","category":"choice","categoryLabel":"the｜独一无二","type":"single","prompt":"___ sun gives us light and heat.","options":["A","An","The","不填"],"answer":"The","wrongFeedback":"太阳是独一无二的事物。","explanation":"独一无二的事物前通常用 the：the sun。"},{"id":"AR07","category":"choice","categoryLabel":"零冠词｜三餐","type":"single","prompt":"We usually have ___ breakfast at seven.","options":["a","an","the","不填"],"answer":"不填","wrongFeedback":"普通三餐名称前通常不用冠词。","explanation":"表示日常的一餐时用零冠词：have breakfast。"},{"id":"AR08","category":"choice","categoryLabel":"零冠词｜球类","type":"single","prompt":"My cousins play ___ basketball after school.","options":["a","an","the","不填"],"answer":"不填","wrongFeedback":"球类运动名称前通常不用冠词。","explanation":"球类前用零冠词：play basketball。"},{"id":"AR09","category":"context","categoryLabel":"完整句辨析｜球类与乐器","type":"single","prompt":"选择冠词使用完全正确的句子。","options":["My sister plays the violin, and I play football.","My sister plays violin, and I play the football.","My sister plays a violin, and I play a football.","My sister plays the violin, and I play the football."],"answer":"My sister plays the violin, and I play football.","wrongFeedback":"西洋乐器前通常加 the；球类前通常不加冠词。","explanation":"正确搭配是 play the violin 和 play football。"},{"id":"AR10","category":"context","categoryLabel":"完整句辨析｜科目","type":"single","prompt":"选择冠词使用正确的句子。","options":["English is my favourite subject.","The English is my favourite subject.","An English is my favourite subject.","A English is my favourite subject."],"answer":"English is my favourite subject.","wrongFeedback":"科目名称前通常不用冠词。","explanation":"English 表示学科时使用零冠词。"},{"id":"AR11","category":"context","categoryLabel":"固定搭配｜时间","type":"single","prompt":"选择正确的句子。","options":["I read in the morning.","I read in morning.","I read in a morning.","I read in an morning."],"answer":"I read in the morning.","wrongFeedback":"“在早上”是固定搭配 in the morning。","explanation":"固定搭配：in the morning。"},{"id":"AR12","category":"context","categoryLabel":"the｜序数词","type":"single","prompt":"Ben is ___ first student to finish the task.","options":["a","an","the","不填"],"answer":"the","wrongFeedback":"序数词 first 前通常使用 the。","explanation":"序数词前用 the：the first student。"},{"id":"AR13","category":"context","categoryLabel":"零冠词｜国家","type":"single","prompt":"My aunt lives in ___ China and works in ___ city near the sea.","options":["不填；a","the；a","不填；the","a；the"],"answer":"不填；a","wrongFeedback":"国家名 China 前通常不加冠词；第一次提到一座城市用 a。","explanation":"China 使用零冠词；a city 表示一座尚未特指的城市。"},{"id":"AR14","category":"context","categoryLabel":"语境判断｜一顿丰盛早餐","type":"single","prompt":"We had ___ big breakfast before the trip.","options":["a","an","the","不填"],"answer":"a","wrongFeedback":"三餐前有形容词修饰，表示“一顿……”时可以用 a。","explanation":"a big breakfast 表示“一顿丰盛的早餐”。"},{"id":"AR15","category":"correction","categoryLabel":"句子纠错｜a / an","type":"single","source":"She is an university student.","prompt":"选择正确改法。","options":["She is a university student.","She is the university student.","She is university student.","She is an university student."],"answer":"She is a university student.","wrongFeedback":"university 的读音以辅音音素 /j/ 开头。","explanation":"应该使用 a university student。"},{"id":"AR16","category":"correction","categoryLabel":"句子纠错｜三餐","type":"single","source":"I have the breakfast at seven every day.","prompt":"选择正确改法。","options":["I have breakfast at seven every day.","I have a breakfast at seven every day.","I have an breakfast at seven every day.","I have the breakfasts at seven every day."],"answer":"I have breakfast at seven every day.","wrongFeedback":"表示每天吃早饭时，breakfast 前通常不加冠词。","explanation":"日常三餐使用零冠词：have breakfast。"},{"id":"AR17","category":"correction","categoryLabel":"句子纠错｜乐器","type":"single","source":"He can play piano very well.","prompt":"选择正确改法。","options":["He can play the piano very well.","He can play a piano very well.","He can play an piano very well.","He can play the pianos very well."],"answer":"He can play the piano very well.","wrongFeedback":"表示演奏西洋乐器时，乐器名称前通常加 the。","explanation":"固定搭配：play the piano。"},{"id":"AR18","category":"correction","categoryLabel":"句子纠错｜独一无二","type":"single","source":"Moon goes around the earth.","prompt":"选择正确改法。","options":["The moon goes around the earth.","A moon goes around the earth.","An moon goes around the earth.","The moon goes around an earth."],"answer":"The moon goes around the earth.","wrongFeedback":"moon 和 earth 在这里都指独一无二的天体。","explanation":"使用 the moon 和 the earth。"},{"id":"AR19","category":"multi","categoryLabel":"多选｜找出正确句子","type":"multi","prompt":"选择所有冠词使用正确的句子。","options":["I have lunch at school.","She plays the guitar.","We study the maths on Monday.","He is an honest boy.","They play the volleyball after class.","This is a useful book."],"answer":["I have lunch at school.","She plays the guitar.","He is an honest boy.","This is a useful book."],"wrongFeedback":"注意三餐、科目和球类通常用零冠词；honest 的 h 不发音。","explanation":"lunch、maths、volleyball 的冠词规则不同；honest 用 an，useful 用 a。"},{"id":"AR20","category":"multi","categoryLabel":"多选｜the 的使用","type":"multi","prompt":"选择所有必须使用 the 的搭配。","options":["___ sun","___ first page","play ___ piano","have ___ dinner","study ___ science","play ___ tennis"],"answer":["___ sun","___ first page","play ___ piano"],"wrongFeedback":"独一无二的事物、序数词和西洋乐器前常用 the。","explanation":"the sun、the first page、play the piano；三餐、科目和球类通常用零冠词。"},{"id":"AR21","category":"order","categoryLabel":"句子排序｜再次提到","type":"order","source":"我看到一只猫。那只猫在树下。","prompt":"按正确语序点击词块，组成第二句。","options":["The cat","under","is","the tree","."],"answer":["The cat","is","under","the tree","."],"answerDisplay":"The cat is under the tree.","wrongFeedback":"已经提到过的猫和双方明确的树都使用 the。","explanation":"再次提到同一只猫时用 The cat。"},{"id":"AR22","category":"order","categoryLabel":"句子排序｜球类与乐器","type":"order","source":"她弹钢琴，但她弟弟踢足球。","prompt":"按正确语序点击词块。","options":["but","plays","football","the piano","her brother","She","plays",",","."],"answer":["She","plays","the piano",",","but","her brother","plays","football","."],"answerDisplay":"She plays the piano, but her brother plays football.","wrongFeedback":"乐器前用 the；球类前不用冠词。","explanation":"play the piano；play football。"}]};
      const response = await fetch("./2026-07-22.html", { cache: "no-store" });

        /<script id="practice-data" type="application\/json">[\s\S]*?<\/script>/i,
