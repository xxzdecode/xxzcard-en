<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>一般现在时｜上一课语法挑战</title>
  <style>
    :root {
      --page-bg: #fff4f7;
      --panel: #fffdfc;
      --title: #d97892;
      --mint: #a8d8c8;
      --mint-deep: #397c69;
      --mint-soft: #dff3ea;
      --knowledge: #fff0c9;
      --line: #efdde4;
      --text: #625b63;
      --muted: #81747c;
      --correct: #d7f3dc;
      --wrong: #ffd9d9;
      --feedback-height: 52px;
      --tap: 46px;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: var(--page-bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    button { font: inherit; min-height: var(--tap); cursor: pointer; }
    button:focus-visible { outline: 3px solid #f3b6c7; outline-offset: 2px; }
    .practice-app {
      width: 100vw; height: 100dvh; overflow: hidden;
      display: grid; grid-template-rows: auto minmax(0, 1fr) var(--feedback-height); gap: 10px;
      padding: max(9px, env(safe-area-inset-top)) max(9px, env(safe-area-inset-right))
        max(9px, env(safe-area-inset-bottom)) max(9px, env(safe-area-inset-left));
    }
    .practice-header {
      display: grid; grid-template-columns: minmax(180px, auto) minmax(0, 1fr) auto;
      align-items: center; gap: 10px; min-width: 0; padding: 9px 12px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
      box-shadow: 0 8px 24px rgba(220, 170, 180, .14);
    }
    h1 { margin: 0; color: var(--title); font-size: clamp(21px, 2.4vw, 31px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .knowledge-strip { min-width: 0; display: flex; gap: 6px; flex-wrap: wrap; max-height: 64px; overflow: hidden; }
    .knowledge-chip { padding: 5px 9px; border-radius: 999px; background: var(--knowledge); font-size: clamp(12px, 1.25vw, 15px); font-weight: 700; white-space: nowrap; }
    .header-actions { display: flex; gap: 7px; align-items: center; }
    .progress { padding: 8px 12px; border-radius: 999px; background: var(--mint-soft); color: var(--mint-deep); font-weight: 900; white-space: nowrap; }
    .action { border: 0; border-radius: 999px; padding: 8px 14px; background: var(--mint); color: #fff; font-weight: 800; }
    .action.secondary { color: var(--mint-deep); background: var(--mint-soft); }
    .practice-stage {
      min-width: 0; min-height: 0; overflow: hidden; display: grid; place-items: center;
      padding: clamp(12px, 2vw, 24px); background: var(--panel); border: 1px solid var(--line); border-radius: 24px;
    }
    .question-card { width: min(920px, 100%); max-height: 100%; display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto; gap: 12px; }
    .category { margin: 0; color: var(--muted); font-weight: 800; }
    .prompt { margin: 0; font-size: clamp(21px, 3vw, 35px); line-height: 1.35; overflow-wrap: anywhere; white-space: pre-line; }
    .prompt-context { display: grid; gap: 7px; min-height: 0; }
    .source-line, .answer-zone, .rule-line {
      border-radius: 14px; padding: 8px 12px; overflow-wrap: anywhere;
    }
    .source-line { background: #fff8ef; font-size: clamp(16px, 1.8vw, 21px); font-weight: 800; }
    .answer-zone { min-height: 48px; background: var(--mint-soft); color: var(--mint-deep); font-size: clamp(17px, 2vw, 23px); font-weight: 900; }
    .rule-line { background: var(--knowledge); color: var(--muted); font-size: clamp(13px, 1.35vw, 16px); font-weight: 700; }
    .options { min-height: 0; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .option {
      min-width: 0; border: 2px solid var(--line); border-radius: 16px; padding: 10px 14px;
      background: #fff8fb; color: var(--text); font-weight: 800; font-size: clamp(16px, 2vw, 22px); overflow-wrap: anywhere;
    }
    .option[aria-pressed="true"] { border-color: #e88fa3; background: #fff0f5; }
    .option.correct-option { border-color: #6bb985; background: var(--correct); }
    .option.wrong-option { border-color: #e28a8a; background: var(--wrong); }
    .option.order-picked { opacity: .48; }
    .question-actions { display: flex; justify-content: center; gap: 9px; }
    .feedback {
      height: var(--feedback-height); min-width: 0; display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border: 1px solid var(--line); border-radius: 17px; background: var(--panel); font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .feedback.correct { background: var(--correct); }
    .feedback.wrong { background: var(--wrong); }
    .completion {
      border: 0; border-radius: 22px; padding: 24px; color: var(--text); background: var(--panel);
      box-shadow: 0 20px 60px rgba(80, 55, 70, .25); text-align: center;
    }
    .completion::backdrop { background: rgba(80, 55, 70, .25); }
    @media (orientation: landscape) and (max-height: 520px) {
      :root { --feedback-height: 40px; --tap: 38px; }
      .practice-app { gap: 6px; padding: 6px; }
      .practice-header { padding: 5px 8px; border-radius: 15px; }
      .knowledge-strip { max-height: 40px; gap: 4px; }
      .knowledge-chip { padding: 3px 6px; font-size: 11px; }
      .progress, .action { padding: 5px 9px; font-size: 12px; }
      .practice-stage { padding: 8px; border-radius: 17px; }
      .question-card { gap: 6px; }
      .prompt { font-size: clamp(18px, 3vw, 25px); }
      .options { gap: 6px; }
      .option { padding: 5px 8px; border-radius: 11px; font-size: 14px; }
      .feedback { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    }
    @media (orientation: portrait) and (max-width: 767px) {
      .practice-app {
        position: fixed; left: 0; top: 100dvh; width: 100dvh; height: 100vw;
        transform: rotate(-90deg); transform-origin: top left;
      }
    }
  </style>
</head>
<body>
  <div class="practice-app" id="practiceApp">
    <header class="practice-header">
      <h1 id="pageTitle"></h1>
      <div class="knowledge-strip" id="knowledgeStrip" aria-label="知识摘要"></div>
      <div class="header-actions">
        <span class="progress" id="progressText" aria-live="polite"></span>
        <button class="action" id="newRoundButton" type="button">换一组</button>
      </div>
    </header>
    <main class="practice-stage">
      <section class="question-card" aria-live="polite">
        <p class="category" id="categoryText"></p>
        <div class="prompt-context">
          <div class="source-line" id="sourceLine" hidden></div>
          <h2 class="prompt" id="promptText"></h2>
          <div class="answer-zone" id="answerZone" hidden></div>
          <div class="rule-line" id="ruleLine" hidden></div>
        </div>
        <div class="options" id="options"></div>
        <div class="question-actions">
          <button class="action" id="checkButton" type="button">检查答案</button>
          <button class="action secondary" id="showAnswerButton" type="button">显示答案</button>
          <button class="action secondary" id="nextButton" type="button" disabled>下一题</button>
        </div>
      </section>
    </main>
    <footer class="feedback" id="feedback" aria-live="polite">△ 请选择答案。</footer>
  </div>
  <dialog class="completion" id="completionDialog" data-complete="false">
    <h2>本轮完成</h2>
    <p id="completionText"></p>
    <button class="action" id="restartButton" type="button">再来一轮</button>
  </dialog>
  <script id="practice-data" type="application/json">{"version":1,"title":"一般现在时｜上一课语法挑战","knowledge":["I / you / we / they + 原形","he / she / it + 三单","先找主语，再选动词"],"completion":"语法挑战完成｜你完成了 10 题。先看主语，再决定动词用原形还是三单形式。","round":{"size":10,"quotas":{"choice":4,"transform":2,"correction":2,"multi":1,"order":1},"groups":[{"ids":["GC01","GC02","GC03","GC04"],"shuffle":true},{"ids":["GC05","GC06"],"shuffle":true},{"ids":["GC07","GC08"],"shuffle":true},{"ids":["GC09","GC10"],"shuffle":false}]},"scope":{"mode":"declared","allowedWords":[]},"questions":[{"id":"GC01","category":"choice","categoryLabel":"单句四选一","type":"single","prompt":"My brother ___ breakfast at seven every morning.","options":["have","has","having","is have"],"answer":"has","wrongFeedback":"My brother 是一个人，属于第三人称单数。","explanation":"My brother 相当于 he，have 的三单形式是 has。"},{"id":"GC02","category":"choice","categoryLabel":"单句四选一","type":"single","prompt":"Lily and Amy ___ English after school.","options":["studies","study","studys","is study"],"answer":"study","wrongFeedback":"两个人组成复数主语，动词不用三单形式。","explanation":"Lily and Amy 相当于 they，后面使用动词原形 study。"},{"id":"GC03","category":"choice","categoryLabel":"客观事实","type":"single","prompt":"The sun ___ in the east.","options":["rise","rises","rising","is rise"],"answer":"rises","wrongFeedback":"这是客观事实；主语 The sun 是单数。","explanation":"The sun 相当于 it，rise 直接加 -s 变为 rises。"},{"id":"GC04","category":"choice","categoryLabel":"频度语境","type":"single","prompt":"Tom usually ___ his room on Sunday.","options":["clean","cleans","cleaning","is clean"],"answer":"cleans","wrongFeedback":"usually 表示习惯；Tom 是单数主语。","explanation":"Tom 相当于 he，clean 直接加 -s。"},{"id":"GC05","category":"transform","categoryLabel":"词形变化","type":"single","prompt":"WATCH → ?","rule":"（以 ch 结尾，加 -es）","options":["watchs","watches","watchies","watching"],"answer":"watches","answerDisplay":"WATCH → WATCHES（以 ch 结尾，加 -es）","wrongFeedback":"不要只加 -s；ch 结尾要加 -es。","explanation":"watch 以 ch 结尾，第三人称单数形式是 watches。"},{"id":"GC06","category":"transform","categoryLabel":"词形变化","type":"single","prompt":"STUDY → ?","rule":"（辅音字母 + y：变 y 为 i，再加 -es）","options":["studys","studies","studyes","studying"],"answer":"studies","answerDisplay":"STUDY → STUDIES（Y → IES）","wrongFeedback":"study 中的 y 前面是辅音字母 d。","explanation":"辅音字母 + y 结尾时，先去掉 y，再加 -ies。"},{"id":"GC07","category":"correction","categoryLabel":"句子纠错","type":"single","source":"The dogs runs in the park every day.","prompt":"选择正确改法。","options":["The dogs run in the park every day.","The dogs running in the park every day.","The dogs is run in the park every day.","The dogs runs in the park every day."],"answer":"The dogs run in the park every day.","wrongFeedback":"The dogs 是复数，相当于 they。","explanation":"复数主语后使用动词原形，runs 要改为 run。"},{"id":"GC08","category":"correction","categoryLabel":"句子纠错","type":"single","source":"She is reads books every evening.","prompt":"选择正确改法。","options":["She reads books every evening.","She is read books every evening.","She reading books every evening.","She are reads books every evening."],"answer":"She reads books every evening.","wrongFeedback":"reads 本身就是谓语，前面不再加 is。","explanation":"She is happy. 是 be 动词句；She reads books. 是实义动词句。"},{"id":"GC09","category":"multi","categoryLabel":"多选分类","type":"multi","prompt":"选择所有需要使用第三人称单数动词的主语。","options":["the cat","my mother","Jack","she","they","my friends","you","Tom and Ben"],"answer":["the cat","my mother","Jack","she"],"wrongFeedback":"一个人或一个东西通常相当于 he / she / it。","explanation":"三单包括单数人名、单数名词和单数名词词组。"},{"id":"GC10","category":"order","categoryLabel":"句子排序","type":"order","source":"她每天放学后做作业。","prompt":"按正确语序点击词块。","options":["every day","her homework","does","after school","She","."],"answer":["She","does","her homework","after school","every day","."],"answerDisplay":"She does her homework after school every day.","wrongFeedback":"先放主语，再放动作；She 后的 do 要变成 does。","explanation":"一般现在时肯定句采用“主语 + 动词 + 其他”。"}]}</script>
  <script>
    (() => {
      "use strict";
      const config = JSON.parse(document.getElementById("practice-data").textContent);
      const byId = (id) => document.getElementById(id);
      const ui = {
        title: byId("pageTitle"), knowledge: byId("knowledgeStrip"), progress: byId("progressText"),
        category: byId("categoryText"), prompt: byId("promptText"), source: byId("sourceLine"),
        answerZone: byId("answerZone"), rule: byId("ruleLine"), options: byId("options"),
        check: byId("checkButton"), show: byId("showAnswerButton"), next: byId("nextButton"),
        feedback: byId("feedback"), dialog: byId("completionDialog"), completion: byId("completionText")
      };
      const state = { round: [], index: 0, selected: [], solved: [], revealed: [], attempts: [], firstTry: [] };

      function shuffle(values) {
        const copy = [...values];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }
      function buildRound() {
        if (config.round.shuffle === false) return config.questions.slice(0, config.round.size);
        if (Array.isArray(config.round.groups)) {
          return config.round.groups.flatMap((group) => {
            const ids = new Set(group.ids || []);
            let items = config.questions.filter((q) => ids.has(q.id));
            if (group.shuffle !== false) items = shuffle(items);
            return items;
          }).slice(0, config.round.size);
        }
        const picked = [];
        for (const [category, count] of Object.entries(config.round.quotas)) {
          picked.push(...shuffle(config.questions.filter((q) => q.category === category)).slice(0, count));
        }
        return shuffle(picked);
      }
      function answerIndices(question) {
        const answers = Array.isArray(question.answer) ? question.answer : [question.answer];
        const used = new Set();
        return answers.map((value) => {
          if (typeof value === "number") return value;
          const index = question.options.findIndex((option, optionIndex) => option === value && !used.has(optionIndex));
          used.add(index); return index;
        });
      }
      function answerValues(question) {
        return answerIndices(question).map((index) => question.options[index]);
      }
      function selectedValues(question) {
        return state.selected.map((index) => question.options[index]);
      }
      function isCorrect(question) {
        const selected = selectedValues(question);
        const answers = answerValues(question);
        if (question.type === "order") {
          const indices = answerIndices(question);
          return state.selected.length === indices.length && state.selected.every((value, index) => value === indices[index]);
        }
        if (question.type === "multi") return selected.length === answers.length && selected.every((value) => answers.includes(value));
        return selected.length === 1 && selected[0] === answers[0];
      }
      function completeAnswer(question) {
        return question.answerDisplay || answerValues(question).join(question.type === "order" ? " " : "、");
      }
      function feedback(type, message) {
        ui.feedback.className = `feedback ${type || ""}`.trim();
        ui.feedback.textContent = `${type === "correct" ? "✓" : type === "wrong" ? "×" : "△"} ${message}`;
      }
      function updateAnswerZone(question) {
        if (question.type !== "order") return;
        ui.answerZone.textContent = state.selected.length ? selectedValues(question).join(" ") : "按顺序点击词块，句子会在这里组成。";
      }
      function renderQuestion() {
        const q = state.round[state.index];
        state.selected = [];
        ui.progress.textContent = `第 ${state.index + 1} / ${state.round.length} 题`;
        ui.category.textContent = q.categoryLabel || q.category;
        ui.prompt.textContent = q.prompt;
        ui.source.hidden = !q.source; ui.source.textContent = q.source || "";
        ui.rule.hidden = !q.rule; ui.rule.textContent = q.rule || "";
        ui.answerZone.hidden = q.type !== "order"; updateAnswerZone(q);
        ui.options.replaceChildren(...q.options.map((option, index) => {
          const button = document.createElement("button");
          button.type = "button"; button.className = "option"; button.dataset.optionIndex = String(index);
          button.setAttribute("aria-pressed", "false"); button.textContent = option;
          button.addEventListener("click", () => {
            if (state.solved[state.index]) return;
            if (q.type === "multi") {
              state.selected = state.selected.includes(index) ? state.selected.filter((item) => item !== index) : [...state.selected, index];
            } else if (q.type === "order") {
              if (state.selected.includes(index)) state.selected = state.selected.filter((item) => item !== index);
              else state.selected.push(index);
            } else state.selected = [index];
            ui.options.querySelectorAll(".option").forEach((item) => {
              const picked = state.selected.includes(Number(item.dataset.optionIndex));
              item.setAttribute("aria-pressed", String(picked));
              item.classList.toggle("order-picked", q.type === "order" && picked);
            });
            updateAnswerZone(q);
            feedback("", "已选择，点击“检查答案”。");
          });
          return button;
        }));
        ui.next.disabled = true;
        ui.check.disabled = false; ui.show.disabled = false;
        feedback("", q.type === "multi" ? "请选择全部正确答案。" : q.type === "order" ? "请按正确语序点击全部词块。" : "请选择答案。");
      }
      function startRound() {
        state.round = buildRound(); state.index = 0; state.selected = [];
        state.solved = Array(state.round.length).fill(false); state.revealed = Array(state.round.length).fill(false);
        state.attempts = Array(state.round.length).fill(0); state.firstTry = Array(state.round.length).fill(false);
        ui.dialog.dataset.complete = "false";
        if (ui.dialog.open) ui.dialog.close();
        renderQuestion();
      }
      function checkAnswer() {
        if (!state.selected.length) return feedback("wrong", "请先选择答案。");
        if (state.solved[state.index]) return;
        const q = state.round[state.index];
        state.attempts[state.index] += 1;
        if (isCorrect(q)) {
          state.solved[state.index] = true;
          state.firstTry[state.index] = state.attempts[state.index] === 1 && !state.revealed[state.index];
          ui.options.querySelectorAll(".option").forEach((item) => {
            if (answerValues(q).includes(item.textContent)) item.classList.add("correct-option");
          });
          feedback("correct", `正确。${q.explanation || ""}`.trim());
          ui.check.disabled = true; ui.show.disabled = true; ui.next.disabled = false;
        } else {
          state.selected.forEach((index) => ui.options.querySelector(`[data-option-index="${index}"]`)?.classList.add("wrong-option"));
          feedback("wrong", q.wrongFeedback || "再看助动词、主语和动词原形。你可以继续修改。");
          state.selected = [];
          ui.options.querySelectorAll(".option").forEach((item) => { item.setAttribute("aria-pressed", "false"); item.classList.remove("order-picked"); });
          updateAnswerZone(q);
        }
      }
      function showAnswer() {
        const q = state.round[state.index];
        state.revealed[state.index] = true; state.solved[state.index] = true;
        feedback("correct", `答案：${completeAnswer(q)}。${q.explanation || ""}`);
        ui.answerZone.hidden = false; ui.answerZone.textContent = completeAnswer(q);
        ui.options.querySelectorAll(".option").forEach((item) => {
          if (answerValues(q).includes(item.textContent)) item.classList.add("correct-option");
        });
        ui.check.disabled = true; ui.show.disabled = true;
        ui.next.disabled = false;
      }
      function nextQuestion() {
        if (state.index + 1 < state.round.length) { state.index += 1; renderQuestion(); return; }
        const first = state.firstTry.filter(Boolean).length;
        const final = state.solved.filter(Boolean).length;
        ui.completion.textContent = `${config.completion || "本轮完成。"} 首次正确 ${first} / ${state.round.length}，最终正确 ${final} / ${state.round.length}。`;
        ui.dialog.dataset.complete = "true";
        if (typeof ui.dialog.showModal === "function") ui.dialog.showModal(); else ui.dialog.setAttribute("open", "");
      }

      ui.title.textContent = config.title;
      ui.knowledge.replaceChildren(...config.knowledge.map((text) => {
        const chip = document.createElement("span"); chip.className = "knowledge-chip"; chip.textContent = text; return chip;
      }));
      byId("newRoundButton").addEventListener("click", startRound);
      byId("restartButton").addEventListener("click", startRound);
      ui.check.addEventListener("click", checkAnswer);
      ui.show.addEventListener("click", showAnswer);
      ui.next.addEventListener("click", nextQuestion);
      window.__LESSON_PREP_QA__ = {
        state: () => ({ index: state.index, total: state.round.length, complete: ui.dialog.dataset.complete === "true" }),
        solveCurrent: () => {
          const q = state.round[state.index];
          state.selected = answerIndices(q).filter((index) => index >= 0);
          ui.options.querySelectorAll(".option").forEach((item) => item.setAttribute("aria-pressed", String(state.selected.includes(Number(item.dataset.optionIndex)))));
          updateAnswerZone(q);
        }
      };
      startRound();
    })();
  </script>
</body>
</html>
