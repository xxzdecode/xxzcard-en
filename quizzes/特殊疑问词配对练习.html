<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>特殊疑问词配对练习</title>
  <style>
:root {
      --page-bg: #fff4f7;
      --panel-bg: #fffdfc;
      --title: #e88fa3;
      --mint: #a8d8c8;
      --mint-deep: #5f9f8c;
      --mint-soft: #dff3ea;
      --knowledge: #ffe9d6;
      --knowledge-border: #f0c79a;
      --correct: #d7f3dc;
      --correct-border: #94cfa0;
      --wrong: #ffe0d9;
      --wrong-border: #eaa693;
      --selected: #fff0f5;
      --selected-border: #f3b6c7;
      --text: #625b63;
      --muted: #8a7f86;
      --line: #efdde4;
      --shadow: 0 10px 28px rgba(220, 170, 180, 0.16);

      --target-1-bg: #eaf1fb;
      --target-1-border: #c7dcf3;
      --target-2-bg: #fff3c2;
      --target-2-border: #e8c765;
      --target-3-bg: #ddf5f1;
      --target-3-border: #7fc4bb;
      --target-4-bg: #f6f1f7;
      --target-4-border: #e2d3e4;

      --page-gap: 12px;
      --header-radius: 22px;
      --stage-radius: 24px;
      --feedback-height: 48px;
      --tap-min: 44px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    button,
    input,
    select,
    textarea { font: inherit; }

    button {
      min-height: var(--tap-min);
      border: 0;
      border-radius: 999px;
      padding: 9px 16px;
      color: #fff;
      background: var(--mint);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(120, 183, 162, 0.2);
      transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
    }

    button:active { transform: translateY(1px) scale(0.99); }

    button.secondary {
      color: var(--mint-deep);
      background: var(--mint-soft);
      box-shadow: none;
    }

    button.ghost {
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .practice-app {
      width: 100vw;
      height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) var(--feedback-height);
      gap: var(--page-gap);
      overflow: hidden;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.72), transparent 30%),
        linear-gradient(180deg, #fff7f9 0%, var(--page-bg) 100%);
    }

    .practice-header {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(180px, auto) minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255, 253, 252, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--header-radius);
      box-shadow: var(--shadow);
    }

    .title-block {
      min-width: 0;
      display: flex;
      align-items: center;
      height: 100%;
    }

    .title-block h1 {
      margin: 0;
      color: var(--title);
      font-size: clamp(23px, 2.4vw, 32px);
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .knowledge-strip {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      gap: 6px;
      max-height: 72px;
      overflow: hidden;
    }

    .knowledge-chip {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--knowledge);
      border: 1px solid var(--knowledge-border);
      color: #7b6843;
      font-size: clamp(12px, 1.25vw, 15px);
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      white-space: nowrap;
    }

    .progress-pill {
      min-height: var(--tap-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--mint-deep);
      background: var(--mint-soft);
      font-weight: 900;
    }

    .practice-stage {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: var(--panel-bg);
      border: 1px solid var(--line);
      border-radius: var(--stage-radius);
      box-shadow: var(--shadow);
    }

    .feedback-bar {
      min-width: 0;
      height: var(--feedback-height);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      border-radius: 18px;
      color: var(--text);
      background: #fffdfc;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .feedback-icon { font-size: 20px; line-height: 1; }

    .feedback-text {
      min-width: 0;
      font-size: clamp(13px, 1.35vw, 16px);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feedback-detail {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feedback-bar.correct {
      background: var(--correct);
      border-color: var(--correct-border);
    }

    .feedback-bar.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
    }

    .rules-dialog {
      width: min(680px, calc(100vw - 30px));
      max-height: min(70dvh, 520px);
      padding: 0;
      border: 0;
      border-radius: 22px;
      color: var(--text);
      background: var(--panel-bg);
      box-shadow: 0 20px 60px rgba(120, 85, 100, 0.25);
      overflow: hidden;
    }

    .rules-dialog::backdrop {
      background: rgba(90, 70, 80, 0.22);
      backdrop-filter: blur(3px);
    }

    .rules-dialog header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff8fb;
    }

    .rules-dialog h2 {
      margin: 0;
      color: var(--title);
      font-size: 21px;
    }

    .dialog-body {
      max-height: calc(min(70dvh, 520px) - 72px);
      padding: 16px;
      overflow: auto;
      line-height: 1.7;
    }

    @media (orientation: portrait) and (max-width: 767px) {
      .practice-app {
        position: fixed;
        left: 0;
        top: 100dvh;
        width: 100dvh;
        height: 100vw;
        transform: rotate(-90deg);
        transform-origin: top left;
      }

      .rules-dialog {
        width: min(680px, calc(100dvh - 28px));
        max-height: calc(100vw - 24px);
      }
    }

    @media (min-width: 1280px) {
      .practice-app {
        max-width: 1440px;
        margin: 0 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
        animation: none !important;
      }
    }

    :root {
      --question-card: #f8e9f0;
      --answer-card: rgba(255, 255, 255, 0.82);
    }

    button:focus-visible,
    .match-card:focus-visible {
      outline: 3px solid var(--selected-border);
      outline-offset: 2px;
    }

    .practice-stage { padding: 12px; }

    .match-layout {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .match-column {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      border: 2px dashed var(--target-1-border);
      background: var(--target-1-bg);
      overflow: hidden;
    }

    .match-column.answers {
      border-color: var(--target-3-border);
      background: var(--target-3-bg);
    }

    .column-title {
      margin: 0;
      text-align: center;
      color: var(--text);
      font-size: clamp(16px, 1.6vw, 20px);
    }

    .card-list {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .match-card {
      min-width: 0;
      min-height: var(--tap-min);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border: 2px solid transparent;
      border-radius: 15px;
      background: var(--question-card);
      color: #705f68;
      font-size: clamp(14px, 1.5vw, 19px);
      font-weight: 800;
      line-height: 1.22;
      text-align: center;
      overflow-wrap: anywhere;
      cursor: pointer;
      user-select: none;
    }

    .answers .match-card { background: var(--answer-card); }

    .match-card.selected {
      background: var(--selected);
      border-color: var(--selected-border);
    }

    .match-card.done {
      color: #47745e;
      background: var(--correct);
      border-color: var(--correct-border);
      cursor: default;
    }

    .match-card.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
    }

    .rule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 18px;
    }

    .rule-grid div {
      padding: 8px 10px;
      border-radius: 12px;
      background: var(--knowledge);
      border: 1px solid var(--knowledge-border);
    }

    @media (orientation: landscape) and (max-height: 520px) {
      :root {
        --page-gap: 7px;
        --feedback-height: 40px;
        --header-radius: 16px;
        --stage-radius: 18px;
        --tap-min: 38px;
      }

      .practice-app {
        padding:
          max(6px, env(safe-area-inset-top))
          max(7px, env(safe-area-inset-right))
          max(6px, env(safe-area-inset-bottom))
          max(7px, env(safe-area-inset-left));
      }

      .practice-header {
        grid-template-columns: minmax(145px, auto) minmax(0, 1fr) auto;
        gap: 7px;
        padding: 6px 8px;
      }

      .knowledge-strip { gap: 4px; max-height: 44px; }
      .knowledge-chip { min-height: 24px; padding: 3px 7px; font-size: 11px; }
      .header-actions { gap: 5px; }
      button, .progress-pill { min-height: 36px; padding: 6px 10px; font-size: 12px; }
      .practice-stage { padding: 7px; }
      .match-layout { gap: 7px; }
      .match-column { gap: 5px; padding: 7px; border-radius: 14px; }
      .card-list { gap: 5px; }
      .match-card { min-height: 34px; padding: 4px 7px; border-radius: 11px; font-size: 12px; }
      .column-title { font-size: 14px; }
      .feedback-bar { gap: 6px; padding: 4px 10px; border-radius: 13px; }
      .feedback-icon { font-size: 16px; }
      .feedback-text { font-size: 12px; }
      .feedback-detail { display: none; }
    }
  </style>
</head>
<body>
  <div class="practice-app" id="practiceApp" data-layout="landscape-practice">
    <header class="practice-header">
      <div class="title-block">
        <h1>特殊疑问词配对</h1>
      </div>

      <div class="knowledge-strip" aria-label="特殊疑问词知识摘要">
        <span class="knowledge-chip">What｜什么</span>
        <span class="knowledge-chip">Who｜谁</span>
        <span class="knowledge-chip">Where｜哪里</span>
        <span class="knowledge-chip">When｜时间</span>
        <span class="knowledge-chip">Why｜原因</span>
        <span class="knowledge-chip">How｜方式</span>
        <span class="knowledge-chip">How old｜年龄</span>
        <span class="knowledge-chip">How many｜数量</span>
      </div>

      <div class="header-actions">
        <div class="progress-pill" id="progressText" aria-live="polite">完成 0 / 6</div>
        <button class="secondary" type="button" id="rulesButton">查看规则</button>
        <button type="button" id="restartButton">重新开始</button>
      </div>
    </header>

    <main class="practice-stage" aria-label="特殊疑问词配对练习区">
      <div class="match-layout">
        <section class="match-column" aria-labelledby="questionTitle">
          <h2 class="column-title" id="questionTitle">问句</h2>
          <div class="card-list" id="questions"></div>
        </section>

        <section class="match-column answers" aria-labelledby="answerTitle">
          <h2 class="column-title" id="answerTitle">回答</h2>
          <div class="card-list" id="answers"></div>
        </section>
      </div>
    </main>

    <footer class="feedback-bar" id="feedbackBar" aria-live="polite">
      <span class="feedback-icon" id="feedbackIcon">△</span>
      <span class="feedback-text" id="feedbackText">先选择一个问句。</span>
      <span class="feedback-detail" id="feedbackDetail">配对错误后可以继续尝试。</span>
    </footer>
  </div>

  <dialog class="rules-dialog" id="rulesDialog">
    <header>
      <h2>特殊疑问词提示</h2>
      <button class="ghost" type="button" id="closeRulesButton">关闭</button>
    </header>
    <div class="dialog-body">
      <div class="rule-grid">
        <div><b>Who</b>：问“谁”</div>
        <div><b>Where</b>：问“哪里”</div>
        <div><b>When</b>：问“什么时候”</div>
        <div><b>Why</b>：问“为什么”</div>
        <div><b>How old</b>：问“几岁”</div>
        <div><b>How many</b>：问“多少个”</div>
      </div>
      <p><b>做题方法：</b>先看问句开头，再观察回答里的人、地点、时间、原因、年龄或数量。</p>
    </div>
  </dialog>

  <script>
    const pairs = [
      { id: "who", question: "Who is he?", answer: "He is my brother." },
      { id: "where", question: "Where is my book?", answer: "It is on the desk." },
      { id: "when", question: "When do you get up?", answer: "I get up at seven." },
      { id: "why", question: "Why are you happy?", answer: "Because it is my birthday." },
      { id: "age", question: "How old are you?", answer: "I am ten years old." },
      { id: "many", question: "How many apples do you have?", answer: "I have three apples." }
    ];

    const state = {
      selectedQuestion: null,
      completed: 0,
      locked: false
    };

    const questionsBox = document.getElementById("questions");
    const answersBox = document.getElementById("answers");
    const progressText = document.getElementById("progressText");
    const feedbackBar = document.getElementById("feedbackBar");
    const feedbackIcon = document.getElementById("feedbackIcon");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackDetail = document.getElementById("feedbackDetail");
    const rulesDialog = document.getElementById("rulesDialog");

    function shuffle(items) {
      const result = [...items];
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function updateProgress() {
      progressText.textContent = `完成 ${state.completed} / ${pairs.length}`;
    }

    function showFeedback(type, message, detail = "") {
      feedbackBar.classList.remove("correct", "wrong");
      const config = {
        neutral: { icon: "△", className: "" },
        correct: { icon: "✓", className: "correct" },
        wrong: { icon: "×", className: "wrong" }
      };
      const current = config[type] || config.neutral;
      feedbackIcon.textContent = current.icon;
      feedbackText.textContent = message;
      feedbackDetail.textContent = detail;
      if (current.className) feedbackBar.classList.add(current.className);
    }

    function clearQuestionSelection() {
      questionsBox.querySelectorAll(".match-card").forEach((card) => {
        card.classList.remove("selected");
        card.setAttribute("aria-pressed", "false");
      });
    }

    function createCard(item, side) {
      const card = document.createElement("div");
      card.className = "match-card";
      card.tabIndex = 0;
      card.setAttribute("role", "button");
      card.dataset.id = item.id;
      card.dataset.side = side;
      card.textContent = side === "question" ? item.question : item.answer;

      const activate = () => {
        if (card.classList.contains("done") || state.locked) return;
        if (side === "question") selectQuestion(card);
        else selectAnswer(card);
      };

      card.addEventListener("click", activate);
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          activate();
        }
      });
      return card;
    }

    function selectQuestion(card) {
      clearQuestionSelection();
      state.selectedQuestion = card;
      card.classList.add("selected");
      card.setAttribute("aria-pressed", "true");
      showFeedback("neutral", `已选择：${card.textContent}`, "请点击右侧回答。");
    }

    function selectAnswer(answerCard) {
      if (!state.selectedQuestion) {
        showFeedback("wrong", "请先选择左侧问句。", "再选择右侧回答。");
        return;
      }

      const questionCard = state.selectedQuestion;
      state.locked = true;

      if (questionCard.dataset.id === answerCard.dataset.id) {
        questionCard.classList.remove("selected");
        questionCard.classList.add("done");
        answerCard.classList.add("done");
        questionCard.setAttribute("aria-disabled", "true");
        answerCard.setAttribute("aria-disabled", "true");
        state.selectedQuestion = null;
        state.completed += 1;
        updateProgress();

        if (state.completed === pairs.length) {
          showFeedback("correct", "全部配对完成！", "可以点击“重新开始”再练一次。");
        } else {
          showFeedback("correct", "配对正确。", `还剩 ${pairs.length - state.completed} 组。`);
        }
        state.locked = false;
        return;
      }

      questionCard.classList.add("wrong");
      answerCard.classList.add("wrong");
      showFeedback("wrong", "这两个不匹配。", "看看回答是在说人、地点、时间还是数量。");

      window.setTimeout(() => {
        questionCard.classList.remove("wrong", "selected");
        questionCard.setAttribute("aria-pressed", "false");
        answerCard.classList.remove("wrong");
        state.selectedQuestion = null;
        state.locked = false;
      }, 650);
    }

    function startRound() {
      state.selectedQuestion = null;
      state.completed = 0;
      state.locked = false;
      questionsBox.innerHTML = "";
      answersBox.innerHTML = "";

      shuffle(pairs).forEach((item) => questionsBox.appendChild(createCard(item, "question")));
      shuffle(pairs).forEach((item) => answersBox.appendChild(createCard(item, "answer")));

      updateProgress();
      showFeedback("neutral", "先选择一个问句。", "配对错误后可以继续尝试。");
    }

    async function tryLandscapeMode() {
      try {
        if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (_) {}

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape");
        }
      } catch (_) {}
    }

    document.getElementById("restartButton").addEventListener("click", async () => {
      await tryLandscapeMode();
      startRound();
    });

    document.getElementById("rulesButton").addEventListener("click", () => {
      if (typeof rulesDialog.showModal === "function") rulesDialog.showModal();
      else rulesDialog.setAttribute("open", "");
    });

    document.getElementById("closeRulesButton").addEventListener("click", () => rulesDialog.close());

    rulesDialog.addEventListener("click", (event) => {
      if (event.target === rulesDialog) rulesDialog.close();
    });

    startRound();
  </script>
</body>
</html>
