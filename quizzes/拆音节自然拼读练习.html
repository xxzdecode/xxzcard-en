<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>拆音节自然拼读练习</title>
  <style>

    :root {
      --page-bg: #fff4f7;
      --panel-bg: #fffdfc;
      --title: #e88fa3;
      --mint: #a8d8c8;
      --mint-deep: #5f9f8c;
      --mint-soft: #dff3ea;
      --knowledge: #ffe9d6;
      --knowledge-border: #f0c79a;
      --correct: #d7f3dc;
      --correct-border: #94cfa0;
      --wrong: #ffe0d9;
      --wrong-border: #eaa693;
      --selected: #fff0f5;
      --selected-border: #f3b6c7;
      --text: #625b63;
      --muted: #8a7f86;
      --line: #efdde4;
      --shadow: 0 10px 28px rgba(220, 170, 180, 0.16);
      --target-1-bg: #eaf1fb;
      --target-1-border: #c7dcf3;
      --target-2-bg: #fff3c2;
      --target-2-border: #e8c765;
      --target-3-bg: #ddf5f1;
      --target-3-border: #7fc4bb;
      --target-4-bg: #f6f1f7;
      --target-4-border: #e2d3e4;
      --page-gap: 12px;
      --header-radius: 22px;
      --stage-radius: 24px;
      --feedback-height: 50px;
      --tap-min: 44px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    button, input, select, textarea { font: inherit; }

    button {
      min-height: var(--tap-min);
      border: 0;
      border-radius: 999px;
      padding: 9px 16px;
      color: #fff;
      background: var(--mint);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(120, 183, 162, 0.2);
      transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
    }

    button:active { transform: translateY(1px) scale(0.99); }

    button.secondary {
      color: var(--mint-deep);
      background: var(--mint-soft);
      box-shadow: none;
    }

    button.ghost {
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.small {
      min-height: 36px;
      padding: 5px 11px;
      font-size: 12px;
      box-shadow: none;
    }

    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .practice-app {
      width: 100vw;
      height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) var(--feedback-height);
      gap: var(--page-gap);
      overflow: hidden;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.72), transparent 30%),
        linear-gradient(180deg, #fff7f9 0%, var(--page-bg) 100%);
    }

    .practice-header {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(180px, auto) minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255, 253, 252, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--header-radius);
      box-shadow: var(--shadow);
    }

    .title-block {
      min-width: 0;
      display: flex;
      align-items: center;
      height: 100%;
    }

    .title-block h1 {
      margin: 0;
      color: var(--title);
      font-size: clamp(23px, 2.4vw, 32px);
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .knowledge-strip {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      gap: 6px;
      max-height: 72px;
      overflow: hidden;
    }

    .knowledge-chip {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--knowledge);
      border: 1px solid var(--knowledge-border);
      color: #7b6843;
      font-size: clamp(12px, 1.25vw, 15px);
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      white-space: nowrap;
    }

    .progress-pill {
      min-height: var(--tap-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--mint-deep);
      background: var(--mint-soft);
      font-weight: 900;
    }

    .practice-stage {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: var(--panel-bg);
      border: 1px solid var(--line);
      border-radius: var(--stage-radius);
      box-shadow: var(--shadow);
    }

    .feedback-bar {
      min-width: 0;
      height: var(--feedback-height);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 6px 10px 6px 14px;
      border-radius: 18px;
      color: var(--text);
      background: #fffdfc;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .feedback-bar.correct {
      background: var(--correct);
      border-color: var(--correct-border);
    }

    .feedback-bar.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
    }

    .feedback-icon { font-size: 20px; line-height: 1; }

    .feedback-message { min-width: 0; }

    .feedback-text {
      min-width: 0;
      font-size: clamp(13px, 1.3vw, 16px);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feedback-detail {
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feedback-actions {
      display: flex;
      gap: 6px;
      white-space: nowrap;
    }

    .rules-dialog {
      width: min(700px, calc(100vw - 30px));
      max-height: min(74dvh, 540px);
      padding: 0;
      border: 0;
      border-radius: 22px;
      color: var(--text);
      background: var(--panel-bg);
      box-shadow: 0 20px 60px rgba(120, 85, 100, 0.25);
      overflow: hidden;
    }

    .rules-dialog::backdrop {
      background: rgba(90, 70, 80, 0.22);
      backdrop-filter: blur(3px);
    }

    .rules-dialog header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff8fb;
    }

    .rules-dialog h2 { margin: 0; color: var(--title); font-size: 21px; }

    .dialog-body {
      max-height: calc(min(74dvh, 540px) - 72px);
      padding: 16px;
      overflow: auto;
      line-height: 1.7;
    }

    .rule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .rule-card {
      padding: 11px;
      border-radius: 15px;
      background: var(--knowledge);
      border: 1px solid var(--knowledge-border);
    }

    @media (orientation: landscape) and (max-height: 520px) {
      :root {
        --page-gap: 7px;
        --feedback-height: 42px;
        --header-radius: 16px;
        --stage-radius: 18px;
        --tap-min: 38px;
      }

      .practice-app {
        padding:
          max(6px, env(safe-area-inset-top))
          max(7px, env(safe-area-inset-right))
          max(6px, env(safe-area-inset-bottom))
          max(7px, env(safe-area-inset-left));
      }

      .practice-header {
        grid-template-columns: minmax(145px, auto) minmax(0, 1fr) auto;
        gap: 7px;
        padding: 6px 8px;
      }

      .title-block h1 { font-size: clamp(18px, 2.4vw, 24px); }
      .knowledge-strip { gap: 4px; max-height: 44px; }
      .knowledge-chip { min-height: 24px; padding: 3px 7px; font-size: 11px; }
      .header-actions { gap: 5px; }
      button, .progress-pill { min-height: 36px; padding: 6px 10px; font-size: 12px; }
      button.small { min-height: 32px; padding: 4px 8px; font-size: 11px; }
      .feedback-bar { gap: 6px; padding: 3px 7px 3px 10px; border-radius: 13px; }
      .feedback-icon { font-size: 16px; }
      .feedback-text { font-size: 12px; }
      .feedback-detail { display: none; }
    }

    @media (orientation: portrait) and (max-width: 767px) {
      .practice-app {
        position: fixed;
        left: 0;
        top: 100dvh;
        width: 100dvh;
        height: 100vw;
        transform: rotate(-90deg);
        transform-origin: top left;
      }

      .rules-dialog {
        width: min(700px, calc(100dvh - 28px));
        max-height: calc(100vw - 24px);
      }
    }

    @media (min-width: 1280px) {
      .practice-app { max-width: 1440px; margin: 0 auto; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition: none !important;
        animation: none !important;
      }
    }


    .syllable-layout {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 0.7fr) minmax(220px, 0.3fr);
      gap: 12px;
      padding: 12px;
    }

    .question-panel,
    .guide-panel {
      min-width: 0;
      min-height: 0;
      border-radius: 18px;
      overflow: hidden;
    }

    .question-panel {
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 7px;
      padding: 13px;
      border: 1px dashed #e8cfd9;
      background: #fff8fb;
    }

    .stage-label {
      justify-self: start;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 5px 11px;
      border-radius: 999px;
      color: var(--mint-deep);
      background: var(--mint-soft);
      font-weight: 900;
      font-size: 14px;
    }

    .word-display {
      margin: 0;
      color: #705f68;
      font-size: clamp(38px, 5.6vw, 68px);
      font-weight: 900;
      line-height: 1;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .question-hint {
      min-height: 24px;
      color: var(--muted);
      font-size: clamp(13px, 1.35vw, 17px);
      font-weight: 700;
      text-align: center;
    }

    .task-area {
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .choices {
      width: min(620px, 100%);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .choice,
    .split-choice,
    .piece,
    .built-piece {
      min-width: 0;
      min-height: var(--tap-min);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 9px 12px;
      border-radius: 15px;
      color: #705f68;
      background: var(--target-2-bg);
      border: 2px solid var(--target-2-border);
      font-size: clamp(17px, 2vw, 23px);
      font-weight: 900;
      text-align: center;
      overflow-wrap: anywhere;
      cursor: pointer;
    }

    .choice.selected,
    .split-choice.selected {
      background: var(--selected);
      border-color: var(--selected-border);
      box-shadow: inset 0 0 0 2px rgba(243, 182, 199, 0.24);
    }

    .split-options {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .split-choice { background: var(--target-1-bg); border-color: var(--target-1-border); }

    .build-wrap {
      width: min(760px, 100%);
      display: grid;
      grid-template-rows: auto minmax(58px, auto);
      gap: 12px;
    }

    .build-options,
    .answer-line {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .piece,
    .built-piece {
      background: var(--target-3-bg);
      border-color: var(--target-3-border);
    }

    .piece.used { opacity: 0.34; pointer-events: none; }

    .answer-line {
      min-height: 62px;
      padding: 8px;
      border: 2px dashed #d8c8d0;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
    }

    .answer-placeholder { color: var(--muted); font-size: 14px; font-weight: 700; }

    .guide-panel {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 10px;
      padding: 13px;
      background: #f7fcfa;
      border: 1px dashed #cfe5dc;
    }

    .guide-title { margin: 0; font-size: clamp(16px, 1.6vw, 20px); color: #5d8175; }

    .method-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .method-card {
      min-width: 0;
      padding: 9px 7px;
      border-radius: 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .method-card:nth-child(1) { background: var(--target-1-bg); }
    .method-card:nth-child(2) { background: var(--target-2-bg); }
    .method-card:nth-child(3) { background: var(--target-3-bg); }

    .round-words {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 6px;
      overflow: hidden;
    }

    .round-word {
      padding: 5px 8px;
      border-radius: 999px;
      color: #766c74;
      background: #f6f1f7;
      border: 1px solid #e2d3e4;
      font-size: 12px;
      font-weight: 800;
    }

    .round-word.done { color: #47745e; background: var(--correct); border-color: var(--correct-border); }
    .hidden { display: none !important; }

    @media (orientation: landscape) and (max-height: 520px) {
      .syllable-layout { grid-template-columns: minmax(0, 0.73fr) minmax(185px, 0.27fr); gap: 7px; padding: 7px; }
      .question-panel, .guide-panel { padding: 8px; border-radius: 14px; }
      .question-panel { gap: 3px; }
      .stage-label { min-height: 23px; padding: 2px 7px; font-size: 10px; }
      .word-display { font-size: clamp(30px, 5vw, 48px); }
      .question-hint { min-height: 18px; font-size: 11px; }
      .choices, .split-options { gap: 5px; }
      .choice, .split-choice, .piece, .built-piece { min-height: 34px; padding: 4px 6px; border-radius: 10px; font-size: 13px; }
      .build-wrap { gap: 6px; grid-template-rows: auto minmax(42px, auto); }
      .answer-line { min-height: 42px; padding: 4px; border-radius: 11px; }
      .guide-panel { gap: 5px; }
      .guide-title { font-size: 14px; }
      .method-grid { gap: 4px; }
      .method-card { padding: 5px 3px; font-size: 10px; border-radius: 10px; }
      .round-words { gap: 4px; }
      .round-word { padding: 3px 5px; font-size: 9px; }
    }

  </style>
</head>
<body>
  <div class="practice-app" id="practiceApp">
    <header class="practice-header">
      <div class="title-block"><h1>拆音节自然拼读</h1></div>
      <div class="knowledge-strip" aria-label="拆音节步骤">
        <span class="knowledge-chip">听｜慢慢读</span>
        <span class="knowledge-chip">拍｜一节一拍</span>
        <span class="knowledge-chip">拆｜找发音小节</span>
        <span class="knowledge-chip">合｜连起来读</span>
      </div>
      <div class="header-actions">
        <div class="progress-pill" id="progressText" aria-live="polite">第 1 / 12 · 0 分</div>
        <button class="secondary" type="button" id="rulesButton">查看方法</button>
        <button type="button" id="restartButton">重新开始</button>
      </div>
    </header>

    <main class="practice-stage" aria-label="拆音节练习区">
      <div class="syllable-layout">
        <section class="question-panel">
          <div class="stage-label" id="stageLabel">第 1 题 · 数音节</div>
          <h2 class="word-display" id="wordDisplay">apple</h2>
          <div class="question-hint" id="hintText">慢慢读单词，听一听有几个音节。</div>
          <div class="task-area">
            <div class="choices" id="countTask"></div>
            <div class="split-options hidden" id="splitTask"></div>
            <div class="build-wrap hidden" id="buildTask">
              <div class="build-options" id="buildOptions"></div>
              <div class="answer-line" id="answerLine"><span class="answer-placeholder">点击音节，按顺序拼成单词</span></div>
            </div>
          </div>
        </section>

        <aside class="guide-panel" aria-label="学习方法与本轮单词">
          <h2 class="guide-title">学习方法</h2>
          <div class="method-grid">
            <div class="method-card">① 听<br />慢慢读</div>
            <div class="method-card">② 拆<br />拍手数</div>
            <div class="method-card">③ 合<br />完整读</div>
          </div>
          <div class="round-words" id="wordList"></div>
        </aside>
      </div>
    </main>

    <footer class="feedback-bar" id="feedbackBar" aria-live="polite">
      <span class="feedback-icon" id="feedbackIcon">△</span>
      <div class="feedback-message">
        <div class="feedback-text" id="feedbackText">准备好后开始答题。</div>
        <div class="feedback-detail" id="feedbackDetail">先读一遍，再完成当前任务。</div>
      </div>
      <div class="feedback-actions">
        <button class="secondary small" type="button" id="speakButton">🔊 听单词</button>
        <button class="ghost small hidden" type="button" id="clearBuildButton">重排</button>
        <button class="small" type="button" id="checkButton">检查答案</button>
        <button class="small hidden" type="button" id="nextButton">下一题</button>
      </div>
    </footer>
  </div>

  <dialog class="rules-dialog" id="rulesDialog">
    <header>
      <h2>拆音节学习方法</h2>
      <button class="ghost" type="button" id="closeRulesButton">关闭</button>
    </header>
    <div class="dialog-body">
      <div class="rule-grid">
        <div class="rule-card"><b>先听</b><br />把单词慢慢读一遍，注意声音自然分成几小节。</div>
        <div class="rule-card"><b>再拍</b><br />每听到一个明显的发音小节，就拍一下手。</div>
        <div class="rule-card"><b>再拆</b><br />选择与读音相符的拆分，不只看字母多少。</div>
        <div class="rule-card"><b>最后合</b><br />把音节按顺序连起来，再完整读一遍单词。</div>
      </div>
      <p><b>提醒：</b>本练习按常用读音数音节，不要求记复杂术语。</p>
    </div>
  </dialog>

  <script>
    const questions = [
      { type: "count", word: "apple", syllables: ["ap", "ple"] },
      { type: "count", word: "banana", syllables: ["ba", "na", "na"] },
      { type: "count", word: "potato", syllables: ["po", "ta", "to"] },
      { type: "count", word: "breakfast", syllables: ["break", "fast"] },
      { type: "split", word: "tomato", syllables: ["to", "ma", "to"], options: ["to | ma | to", "tom | a | to", "to | mat | o"] },
      { type: "split", word: "cucumber", syllables: ["cu", "cum", "ber"], options: ["cu | cum | ber", "cuc | um | ber", "cu | cu | mber"] },
      { type: "split", word: "sandwich", syllables: ["sand", "wich"], options: ["sand | wich", "san | dwi | ch", "sandw | ich"] },
      { type: "split", word: "appetite", syllables: ["ap", "pe", "tite"], options: ["ap | pe | tite", "app | et | ite", "appe | tite"] },
      { type: "build", word: "lettuce", syllables: ["let", "tuce"] },
      { type: "build", word: "salad", syllables: ["sal", "ad"] },
      { type: "build", word: "dinner", syllables: ["din", "ner"] },
      { type: "build", word: "hamburger", syllables: ["ham", "bur", "ger"] }
    ];

    const state = { index: 0, score: 0, selected: null, built: [], answered: false };
    const progressText = document.getElementById("progressText");
    const stageLabel = document.getElementById("stageLabel");
    const wordDisplay = document.getElementById("wordDisplay");
    const hintText = document.getElementById("hintText");
    const countTask = document.getElementById("countTask");
    const splitTask = document.getElementById("splitTask");
    const buildTask = document.getElementById("buildTask");
    const buildOptions = document.getElementById("buildOptions");
    const answerLine = document.getElementById("answerLine");
    const checkButton = document.getElementById("checkButton");
    const nextButton = document.getElementById("nextButton");
    const clearBuildButton = document.getElementById("clearBuildButton");

    function shuffle(items) {
      const result = [...items];
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }


    const feedbackBar = document.getElementById("feedbackBar");
    const feedbackIcon = document.getElementById("feedbackIcon");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackDetail = document.getElementById("feedbackDetail");
    const rulesDialog = document.getElementById("rulesDialog");

    function showFeedback(type, message, detail = "") {
      feedbackBar.classList.remove("correct", "wrong");
      const config = {
        neutral: { icon: "△", className: "" },
        correct: { icon: "✓", className: "correct" },
        wrong: { icon: "×", className: "wrong" }
      };
      const current = config[type] || config.neutral;
      feedbackIcon.textContent = current.icon;
      feedbackText.textContent = message;
      feedbackDetail.textContent = detail;
      if (current.className) feedbackBar.classList.add(current.className);
    }

    document.getElementById("rulesButton").addEventListener("click", () => rulesDialog.showModal());
    document.getElementById("closeRulesButton").addEventListener("click", () => rulesDialog.close());
    rulesDialog.addEventListener("click", (event) => {
      if (event.target === rulesDialog) rulesDialog.close();
    });


    function updateProgress() {
      const shown = Math.min(state.index + 1, questions.length);
      progressText.textContent = `第 ${shown} / ${questions.length} · ${state.score} 分`;
      document.querySelectorAll(".round-word").forEach((chip, chipIndex) => {
        chip.classList.toggle("done", chipIndex < state.index);
      });
    }

    function renderWordList() {
      document.getElementById("wordList").innerHTML = questions
        .map((item, index) => `<span class="round-word ${index < state.index ? "done" : ""}">${item.word}</span>`)
        .join("");
    }

    function speakWord() {
      if (!("speechSynthesis" in window) || state.index >= questions.length) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(questions[state.index].word);
      utterance.lang = "en-GB";
      utterance.rate = 0.72;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function setTaskVisibility(type) {
      countTask.classList.toggle("hidden", type !== "count");
      splitTask.classList.toggle("hidden", type !== "split");
      buildTask.classList.toggle("hidden", type !== "build");
      clearBuildButton.classList.toggle("hidden", type !== "build");
    }

    function renderBuildAnswer() {
      if (!state.built.length) {
        answerLine.innerHTML = '<span class="answer-placeholder">点击音节，按顺序拼成单词</span>';
        return;
      }
      answerLine.innerHTML = state.built.map((piece) => `<span class="built-piece">${piece}</span>`).join("");
    }

    function clearBuild() {
      if (state.answered) return;
      state.built = [];
      buildOptions.querySelectorAll(".piece").forEach((button) => button.classList.remove("used"));
      renderBuildAnswer();
      showFeedback("neutral", "已清空拼写顺序。", "请重新点击音节。");
    }

    function renderQuestion() {
      state.selected = null;
      state.built = [];
      state.answered = false;
      const question = questions[state.index];
      wordDisplay.textContent = question.word;
      checkButton.classList.remove("hidden");
      nextButton.classList.add("hidden");
      setTaskVisibility(question.type);

      if (question.type === "count") {
        stageLabel.textContent = `第 ${state.index + 1} 题 · 数音节`;
        hintText.textContent = "慢慢读单词，听一听有几个音节。";
        countTask.innerHTML = [1, 2, 3, 4]
          .map((value) => `<button class="choice" type="button" data-value="${value}">${value}</button>`)
          .join("");
        countTask.querySelectorAll(".choice").forEach((button) => {
          button.addEventListener("click", () => {
            if (state.answered) return;
            countTask.querySelectorAll(".choice").forEach((item) => item.classList.remove("selected"));
            button.classList.add("selected");
            state.selected = Number(button.dataset.value);
            showFeedback("neutral", `已选择 ${state.selected} 个音节。`, "点击“检查答案”。");
          });
        });
      } else if (question.type === "split") {
        stageLabel.textContent = `第 ${state.index + 1} 题 · 选择拆分`;
        hintText.textContent = "观察单词，选择与常用读音相符的拆分。";
        splitTask.innerHTML = shuffle(question.options)
          .map((option) => `<button class="split-choice" type="button" data-value="${option}">${option}</button>`)
          .join("");
        splitTask.querySelectorAll(".split-choice").forEach((button) => {
          button.addEventListener("click", () => {
            if (state.answered) return;
            splitTask.querySelectorAll(".split-choice").forEach((item) => item.classList.remove("selected"));
            button.classList.add("selected");
            state.selected = button.dataset.value;
            showFeedback("neutral", `已选择：${state.selected}`, "点击“检查答案”。");
          });
        });
      } else {
        stageLabel.textContent = `第 ${state.index + 1} 题 · 拼回单词`;
        hintText.textContent = "点击音节，按正确顺序拼成完整单词。";
        buildOptions.innerHTML = shuffle(question.syllables.map((value, id) => ({ value, id })))
          .map((piece) => `<button class="piece" type="button" data-id="${piece.id}" data-value="${piece.value}">${piece.value}</button>`)
          .join("");
        renderBuildAnswer();
        buildOptions.querySelectorAll(".piece").forEach((button) => {
          button.addEventListener("click", () => {
            if (state.answered || button.classList.contains("used")) return;
            button.classList.add("used");
            state.built.push(button.dataset.value);
            renderBuildAnswer();
            showFeedback("neutral", `当前拼写：${state.built.join("")}`, "可以点击“重排”重新开始。");
          });
        });
      }

      showFeedback("neutral", "准备好后开始答题。", "先读一遍，再完成当前任务。");
      updateProgress();
    }

    function checkAnswer() {
      if (state.answered) return;
      const question = questions[state.index];
      const hasAnswer = question.type === "build" ? state.built.length > 0 : state.selected !== null;
      if (!hasAnswer) {
        showFeedback("wrong", "请先完成当前选择。", "完成后再检查答案。");
        return;
      }

      let correct = false;
      if (question.type === "count") correct = state.selected === question.syllables.length;
      if (question.type === "split") correct = state.selected === question.syllables.join(" | ");
      if (question.type === "build") correct = state.built.join("") === question.word;

      state.answered = true;
      if (correct) {
        state.score += 1;
        showFeedback("correct", `正确：${question.word} → ${question.syllables.join(" | ")}`, `共有 ${question.syllables.length} 个音节。`);
      } else {
        showFeedback("wrong", `正确拆分：${question.syllables.join(" | ")}`, "跟着读一遍，再进入下一题。");
      }
      checkButton.classList.add("hidden");
      nextButton.classList.remove("hidden");
      updateProgress();
    }

    function nextQuestion() {
      state.index += 1;
      if (state.index >= questions.length) {
        wordDisplay.textContent = "完成！";
        stageLabel.textContent = "练习完成";
        hintText.textContent = `答对 ${state.score} / ${questions.length} 题。`;
        countTask.classList.add("hidden");
        splitTask.classList.add("hidden");
        buildTask.classList.add("hidden");
        clearBuildButton.classList.add("hidden");
        checkButton.classList.add("hidden");
        nextButton.classList.add("hidden");
        progressText.textContent = `完成 · ${state.score} / ${questions.length} 分`;
        document.querySelectorAll(".round-word").forEach((chip) => chip.classList.add("done"));
        showFeedback("correct", "全部练习完成！", "点击“重新开始”可以再练一次。");
        return;
      }
      renderQuestion();
    }

    function restart() {
      state.index = 0;
      state.score = 0;
      state.selected = null;
      state.built = [];
      state.answered = false;
      renderWordList();
      renderQuestion();
    }

    document.getElementById("speakButton").addEventListener("click", speakWord);
    document.getElementById("restartButton").addEventListener("click", restart);
    clearBuildButton.addEventListener("click", clearBuild);
    checkButton.addEventListener("click", checkAnswer);
    nextButton.addEventListener("click", nextQuestion);

    renderWordList();
    renderQuestion();
  </script>
</body>
</html>
