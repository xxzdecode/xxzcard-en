<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>加 -er 的职业单词配对练习</title>
  <style>

    :root {
      --page-bg: #fff4f7;
      --panel-bg: #fffdfc;
      --title: #e88fa3;
      --mint: #a8d8c8;
      --mint-deep: #5f9f8c;
      --mint-soft: #dff3ea;
      --knowledge: #ffe9d6;
      --knowledge-border: #f0c79a;
      --correct: #d7f3dc;
      --correct-border: #94cfa0;
      --wrong: #ffe0d9;
      --wrong-border: #eaa693;
      --selected: #fff0f5;
      --selected-border: #f3b6c7;
      --text: #625b63;
      --muted: #8a7f86;
      --line: #efdde4;
      --shadow: 0 10px 28px rgba(220, 170, 180, 0.16);
      --target-1-bg: #eaf1fb;
      --target-1-border: #c7dcf3;
      --target-2-bg: #fff3c2;
      --target-2-border: #e8c765;
      --target-3-bg: #ddf5f1;
      --target-3-border: #7fc4bb;
      --target-4-bg: #f6f1f7;
      --target-4-border: #e2d3e4;
      --page-gap: 12px;
      --header-radius: 22px;
      --stage-radius: 24px;
      --feedback-height: 50px;
      --tap-min: 44px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    button, input, select, textarea { font: inherit; }

    button {
      min-height: var(--tap-min);
      border: 0;
      border-radius: 999px;
      padding: 9px 16px;
      color: #fff;
      background: var(--mint);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(120, 183, 162, 0.2);
      transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
    }

    button:active { transform: translateY(1px) scale(0.99); }

    button.secondary {
      color: var(--mint-deep);
      background: var(--mint-soft);
      box-shadow: none;
    }

    button.ghost {
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.small {
      min-height: 36px;
      padding: 5px 11px;
      font-size: 12px;
      box-shadow: none;
    }

    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .practice-app {
      width: 100vw;
      height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) var(--feedback-height);
      gap: var(--page-gap);
      overflow: hidden;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.72), transparent 30%),
        linear-gradient(180deg, #fff7f9 0%, var(--page-bg) 100%);
    }

    .practice-header {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(180px, auto) minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255, 253, 252, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--header-radius);
      box-shadow: var(--shadow);
    }

    .title-block {
      min-width: 0;
      display: flex;
      align-items: center;
      height: 100%;
    }

    .title-block h1 {
      margin: 0;
      color: var(--title);
      font-size: clamp(23px, 2.4vw, 32px);
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .knowledge-strip {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      gap: 6px;
      max-height: 72px;
      overflow: hidden;
    }

    .knowledge-chip {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--knowledge);
      border: 1px solid var(--knowledge-border);
      color: #7b6843;
      font-size: clamp(12px, 1.25vw, 15px);
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      white-space: nowrap;
    }

    .progress-pill {
      min-height: var(--tap-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--mint-deep);
      background: var(--mint-soft);
      font-weight: 900;
    }

    .practice-stage {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: var(--panel-bg);
      border: 1px solid var(--line);
      border-radius: var(--stage-radius);
      box-shadow: var(--shadow);
    }

    .feedback-bar {
      min-width: 0;
      height: var(--feedback-height);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 6px 10px 6px 14px;
      border-radius: 18px;
      color: var(--text);
      background: #fffdfc;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .feedback-bar.correct {
      background: var(--correct);
      border-color: var(--correct-border);
    }

    .feedback-bar.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
    }

    .feedback-icon { font-size: 20px; line-height: 1; }

    .feedback-message { min-width: 0; }

    .feedback-text {
      min-width: 0;
      font-size: clamp(13px, 1.3vw, 16px);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feedback-detail {
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feedback-actions {
      display: flex;
      gap: 6px;
      white-space: nowrap;
    }

    .rules-dialog {
      width: min(700px, calc(100vw - 30px));
      max-height: min(74dvh, 540px);
      padding: 0;
      border: 0;
      border-radius: 22px;
      color: var(--text);
      background: var(--panel-bg);
      box-shadow: 0 20px 60px rgba(120, 85, 100, 0.25);
      overflow: hidden;
    }

    .rules-dialog::backdrop {
      background: rgba(90, 70, 80, 0.22);
      backdrop-filter: blur(3px);
    }

    .rules-dialog header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff8fb;
    }

    .rules-dialog h2 { margin: 0; color: var(--title); font-size: 21px; }

    .dialog-body {
      max-height: calc(min(74dvh, 540px) - 72px);
      padding: 16px;
      overflow: auto;
      line-height: 1.7;
    }

    .rule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .rule-card {
      padding: 11px;
      border-radius: 15px;
      background: var(--knowledge);
      border: 1px solid var(--knowledge-border);
    }

    @media (orientation: landscape) and (max-height: 520px) {
      :root {
        --page-gap: 7px;
        --feedback-height: 42px;
        --header-radius: 16px;
        --stage-radius: 18px;
        --tap-min: 38px;
      }

      .practice-app {
        padding:
          max(6px, env(safe-area-inset-top))
          max(7px, env(safe-area-inset-right))
          max(6px, env(safe-area-inset-bottom))
          max(7px, env(safe-area-inset-left));
      }

      .practice-header {
        grid-template-columns: minmax(145px, auto) minmax(0, 1fr) auto;
        gap: 7px;
        padding: 6px 8px;
      }

      .title-block h1 { font-size: clamp(18px, 2.4vw, 24px); }
      .knowledge-strip { gap: 4px; max-height: 44px; }
      .knowledge-chip { min-height: 24px; padding: 3px 7px; font-size: 11px; }
      .header-actions { gap: 5px; }
      button, .progress-pill { min-height: 36px; padding: 6px 10px; font-size: 12px; }
      button.small { min-height: 32px; padding: 4px 8px; font-size: 11px; }
      .feedback-bar { gap: 6px; padding: 3px 7px 3px 10px; border-radius: 13px; }
      .feedback-icon { font-size: 16px; }
      .feedback-text { font-size: 12px; }
      .feedback-detail { display: none; }
    }

    @media (orientation: portrait) and (max-width: 767px) {
      .practice-app {
        position: fixed;
        left: 0;
        top: 100dvh;
        width: 100dvh;
        height: 100vw;
        transform: rotate(-90deg);
        transform-origin: top left;
      }

      .rules-dialog {
        width: min(700px, calc(100dvh - 28px));
        max-height: calc(100vw - 24px);
      }
    }

    @media (min-width: 1280px) {
      .practice-app { max-width: 1440px; margin: 0 auto; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition: none !important;
        animation: none !important;
      }
    }


    .match-layout {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 12px;
    }

    .match-column {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      padding: 11px;
      border-radius: 18px;
      border: 1px dashed #e8cfd9;
      background: #fff8fb;
      overflow: hidden;
    }

    .match-column.jobs { border-color: #cfe5dc; background: #f7fcfa; }

    .column-title {
      margin: 0;
      color: #70676f;
      font-size: clamp(16px, 1.6vw, 20px);
      text-align: center;
    }

    .card-list {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .match-card {
      min-width: 0;
      min-height: var(--tap-min);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border: 2px solid transparent;
      border-radius: 15px;
      color: #705f68;
      background: var(--target-1-bg);
      font-size: clamp(16px, 1.75vw, 22px);
      font-weight: 900;
      line-height: 1.15;
      text-align: center;
      overflow-wrap: anywhere;
      cursor: pointer;
      user-select: none;
    }

    .jobs .match-card { background: var(--target-2-bg); }

    .match-card small {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.62em;
      font-weight: 700;
    }

    .match-card.selected {
      background: var(--selected);
      border-color: var(--selected-border);
    }

    .match-card.matched {
      color: #47745e;
      background: var(--correct);
      border-color: var(--correct-border);
      cursor: default;
    }

    .match-card.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
      animation: shake 0.28s linear;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .match-layout { gap: 7px; padding: 7px; }
      .match-column { gap: 5px; padding: 7px; border-radius: 14px; }
      .card-list { gap: 5px; }
      .column-title { font-size: 14px; }
      .match-card { min-height: 34px; padding: 3px 7px; border-radius: 11px; font-size: 13px; }
      .match-card small { margin-top: 0; }
    }

  </style>
</head>
<body>
  <div class="practice-app" id="practiceApp">
    <header class="practice-header">
      <div class="title-block"><h1>加 -er 职业单词配对</h1></div>
      <div class="knowledge-strip" aria-label="加 er 构词规则">
        <span class="knowledge-chip">多数动词｜直接 + er</span>
        <span class="knowledge-chip">以 e 结尾｜只加 r</span>
        <span class="knowledge-chip">teach → teacher</span>
        <span class="knowledge-chip">write → writer</span>
      </div>
      <div class="header-actions">
        <div class="progress-pill" id="progressText" aria-live="polite">第 1 组 · 0 / 5</div>
        <button class="secondary" type="button" id="rulesButton">查看规则</button>
        <button type="button" id="newRoundButton">换一组</button>
      </div>
    </header>

    <main class="practice-stage" aria-label="职业单词配对练习区">
      <div class="match-layout">
        <section class="match-column" aria-labelledby="baseTitle">
          <h2 class="column-title" id="baseTitle">动作词</h2>
          <div class="card-list" id="leftCards"></div>
        </section>
        <section class="match-column jobs" aria-labelledby="jobTitle">
          <h2 class="column-title" id="jobTitle">职业 / 人物</h2>
          <div class="card-list" id="rightCards"></div>
        </section>
      </div>
    </main>

    <footer class="feedback-bar" id="feedbackBar" aria-live="polite">
      <span class="feedback-icon" id="feedbackIcon">△</span>
      <div class="feedback-message">
        <div class="feedback-text" id="feedbackText">先选择左侧动作词。</div>
        <div class="feedback-detail" id="feedbackDetail">再选择右侧对应的职业或人物单词。</div>
      </div>
      <div class="feedback-actions">
        <button class="secondary small" type="button" id="resetRoundButton">本组重来</button>
      </div>
    </footer>
  </div>

  <dialog class="rules-dialog" id="rulesDialog">
    <header>
      <h2>加 -er / -r 的小规律</h2>
      <button class="ghost" type="button" id="closeRulesButton">关闭</button>
    </header>
    <div class="dialog-body">
      <div class="rule-grid">
        <div class="rule-card"><b>直接 + er</b><br />多数动词直接加 -er：teach → teacher，work → worker。</div>
        <div class="rule-card"><b>只加 r</b><br />动词已经以 e 结尾时，通常只加 -r：write → writer，drive → driver。</div>
      </div>
      <p><b>做题方法：</b>先认出动作词，再找“做这个动作的人”。配错后可以继续尝试。</p>
    </div>
  </dialog>

  <script>
    const pairs = [
      { base: "teach", job: "teacher", meaning: "老师" },
      { base: "work", job: "worker", meaning: "工人" },
      { base: "farm", job: "farmer", meaning: "农民" },
      { base: "sing", job: "singer", meaning: "歌手" },
      { base: "paint", job: "painter", meaning: "画家" },
      { base: "play", job: "player", meaning: "运动员；选手" },
      { base: "drive", job: "driver", meaning: "司机" },
      { base: "dance", job: "dancer", meaning: "舞者" },
      { base: "write", job: "writer", meaning: "作家；写作者" },
      { base: "bake", job: "baker", meaning: "面包师" }
    ];

    const state = { rounds: [], roundIndex: 0, selectedLeft: null, selectedRight: null, completed: 0, attempts: 0, locked: false };
    const leftCards = document.getElementById("leftCards");
    const rightCards = document.getElementById("rightCards");
    const progressText = document.getElementById("progressText");
    const newRoundButton = document.getElementById("newRoundButton");

    function shuffle(items) {
      const result = [...items];
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }


    const feedbackBar = document.getElementById("feedbackBar");
    const feedbackIcon = document.getElementById("feedbackIcon");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackDetail = document.getElementById("feedbackDetail");
    const rulesDialog = document.getElementById("rulesDialog");

    function showFeedback(type, message, detail = "") {
      feedbackBar.classList.remove("correct", "wrong");
      const config = {
        neutral: { icon: "△", className: "" },
        correct: { icon: "✓", className: "correct" },
        wrong: { icon: "×", className: "wrong" }
      };
      const current = config[type] || config.neutral;
      feedbackIcon.textContent = current.icon;
      feedbackText.textContent = message;
      feedbackDetail.textContent = detail;
      if (current.className) feedbackBar.classList.add(current.className);
    }

    document.getElementById("rulesButton").addEventListener("click", () => rulesDialog.showModal());
    document.getElementById("closeRulesButton").addEventListener("click", () => rulesDialog.close());
    rulesDialog.addEventListener("click", (event) => {
      if (event.target === rulesDialog) rulesDialog.close();
    });


    function buildRounds() {
      const order = shuffle(pairs);
      state.rounds = [order.slice(0, 5), order.slice(5, 10)];
    }

    function currentRound() { return state.rounds[state.roundIndex]; }

    function updateProgress() {
      progressText.textContent = `第 ${state.roundIndex + 1} 组 · ${state.completed} / ${currentRound().length}`;
    }

    function clearSelections() {
      document.querySelectorAll(".match-card").forEach((card) => card.classList.remove("selected"));
      state.selectedLeft = null;
      state.selectedRight = null;
    }

    function makeCard(item, side) {
      const card = document.createElement("button");
      card.type = "button";
      card.className = "match-card";
      card.dataset.pair = item.base;
      card.dataset.side = side;
      card.innerHTML = side === "left" ? item.base : `${item.job}<small>${item.meaning}</small>`;
      card.addEventListener("click", () => selectCard(card));
      return card;
    }

    function renderRound() {
      state.completed = 0;
      state.attempts = 0;
      state.locked = false;
      clearSelections();
      leftCards.innerHTML = "";
      rightCards.innerHTML = "";
      shuffle(currentRound()).forEach((item) => leftCards.appendChild(makeCard(item, "left")));
      shuffle(currentRound()).forEach((item) => rightCards.appendChild(makeCard(item, "right")));
      newRoundButton.textContent = "换一组";
      updateProgress();
      showFeedback("neutral", "先选择左侧动作词。", "再选择右侧对应单词；尝试 0 次。");
    }

    function selectCard(card) {
      if (state.locked || card.classList.contains("matched")) return;
      const side = card.dataset.side;
      if (side === "left") {
        if (state.selectedLeft) state.selectedLeft.classList.remove("selected");
        state.selectedLeft = card;
      } else {
        if (state.selectedRight) state.selectedRight.classList.remove("selected");
        state.selectedRight = card;
      }
      card.classList.add("selected");

      if (!state.selectedLeft || !state.selectedRight) {
        const chosen = state.selectedLeft || state.selectedRight;
        showFeedback("neutral", `已选择：${chosen.textContent.trim()}`, "请在另一列选择对应单词。");
        return;
      }
      checkMatch();
    }

    function checkMatch() {
      state.locked = true;
      state.attempts += 1;
      const left = state.selectedLeft;
      const right = state.selectedRight;
      if (left.dataset.pair === right.dataset.pair) {
        const base = left.textContent.trim();
        const job = right.firstChild.textContent.trim();
        left.classList.remove("selected");
        right.classList.remove("selected");
        left.classList.add("matched");
        right.classList.add("matched");
        state.selectedLeft = null;
        state.selectedRight = null;
        state.completed += 1;
        state.locked = false;
        updateProgress();
        if (state.completed === currentRound().length) {
          newRoundButton.textContent = state.roundIndex === state.rounds.length - 1 ? "回到第 1 组" : "下一组";
          showFeedback("correct", "本组全部配对完成！", `共尝试 ${state.attempts} 次，点击“${newRoundButton.textContent}”继续。`);
        } else {
          showFeedback("correct", `正确：${base} → ${job}`, `还剩 ${currentRound().length - state.completed} 对；尝试 ${state.attempts} 次。`);
        }
        return;
      }

      left.classList.add("wrong");
      right.classList.add("wrong");
      showFeedback("wrong", "这两个单词不匹配。", `可以继续尝试；当前尝试 ${state.attempts} 次。`);
      window.setTimeout(() => {
        left.classList.remove("selected", "wrong");
        right.classList.remove("selected", "wrong");
        state.selectedLeft = null;
        state.selectedRight = null;
        state.locked = false;
      }, 520);
    }

    function nextRound() {
      state.roundIndex = (state.roundIndex + 1) % state.rounds.length;
      renderRound();
    }

    document.getElementById("resetRoundButton").addEventListener("click", renderRound);
    newRoundButton.addEventListener("click", nextRound);

    buildRounds();
    renderRound();
  </script>
</body>
</html>
