<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>会做什么，哪里有什么，今天是什么？｜随堂练习</title>
  <style>
    :root {
      --page-bg: #fff4f7;
      --panel: #fffdfc;
      --title: #d97892;
      --mint: #a8d8c8;

      --mint-soft: #dff3ea;
      --knowledge: #fff0c9;
      --line: #efdde4;
      --text: #625b63;
      --muted: #81747c;
      --correct: #d7f3dc;
      --wrong: #ffd9d9;
      --feedback-height: 52px;
      --tap: 46px;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: var(--page-bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    button { font: inherit; min-height: var(--tap); cursor: pointer; }
    button:focus-visible { outline: 3px solid #f3b6c7; outline-offset: 2px; }
    .practice-app {
      width: 100vw; height: 100dvh; overflow: hidden;
      display: grid; grid-template-rows: auto minmax(0, 1fr) var(--feedback-height); gap: 10px;
      padding: max(9px, env(safe-area-inset-top)) max(9px, env(safe-area-inset-right))
        max(9px, env(safe-area-inset-bottom)) max(9px, env(safe-area-inset-left));
    }
    .practice-header {
      display: grid; grid-template-columns: minmax(180px, auto) minmax(0, 1fr) auto;
      align-items: center; gap: 10px; min-width: 0; padding: 9px 12px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
      box-shadow: 0 8px 24px rgba(220, 170, 180, .14);
    }
    h1 { margin: 0; color: var(--title); font-size: clamp(21px, 2.4vw, 31px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .knowledge-strip { min-width: 0; display: flex; gap: 6px; flex-wrap: wrap; max-height: 64px; overflow: hidden; }
    .knowledge-chip { padding: 5px 9px; border-radius: 999px; background: var(--knowledge); font-size: clamp(12px, 1.25vw, 15px); font-weight: 700; white-space: nowrap; }
    .header-actions { display: flex; gap: 7px; align-items: center; }
    .progress { padding: 8px 12px; border-radius: 999px; background: var(--mint-soft); color: var(--mint-deep); font-weight: 900; white-space: nowrap; }
    .action { border: 0; border-radius: 999px; padding: 8px 14px; background: var(--mint); color: #fff; font-weight: 800; }
    .action.secondary { color: var(--mint-deep); background: var(--mint-soft); }
    .practice-stage {
      min-width: 0; min-height: 0; overflow: hidden; display: grid; place-items: center;
      padding: clamp(12px, 2vw, 24px); background: var(--panel); border: 1px solid var(--line); border-radius: 24px;
    }
    .question-card { width: min(920px, 100%); max-height: 100%; display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto auto; gap: 12px; }
    .category { margin: 0; color: var(--muted); font-weight: 800; }
    .prompt { margin: 0; font-size: clamp(21px, 3vw, 35px); line-height: 1.35; overflow-wrap: anywhere; white-space: pre-line; }
    .prompt-context { display: grid; gap: 7px; min-height: 0; }
    .source-line, .answer-zone, .rule-line {
      border-radius: 14px; padding: 8px 12px; overflow-wrap: anywhere;
    }
    .source-line { background: #fff8ef; font-size: clamp(16px, 1.8vw, 21px); font-weight: 800; }
    .source-line.visual-scene { display: flex; align-items: center; justify-content: center; gap: 18px; min-height: 104px; }
    .source-line.visual-scene svg { width: min(440px, 58vw); height: 92px; }
    .answer-zone { min-height: 48px; background: var(--mint-soft); color: var(--mint-deep); font-size: clamp(17px, 2vw, 23px); font-weight: 900; }
    .rule-line { background: var(--knowledge); color: var(--muted); font-size: clamp(13px, 1.35vw, 16px); font-weight: 700; }
    .options { min-height: 0; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .options.order-options { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .option {
      min-width: 0; border: 2px solid var(--line); border-radius: 16px; padding: 10px 14px;
      background: #fff8fb; color: var(--text); font-weight: 800; font-size: clamp(16px, 2vw, 22px); overflow-wrap: anywhere;
    }
    .option[aria-pressed="true"] { border-color: #e88fa3; background: #fff0f5; }
    .option.correct-option { border-color: #6bb985; background: var(--correct); }
    .option.wrong-option { border-color: #e28a8a; background: var(--wrong); }
    .option.order-picked { opacity: .48; }
    .question-actions { display: flex; justify-content: center; gap: 9px; }
    .feedback {
      height: var(--feedback-height); min-width: 0; display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border: 1px solid var(--line); border-radius: 17px; background: var(--panel); font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .feedback.correct { background: var(--correct); }
    .feedback.wrong { background: var(--wrong); }
    .completion {
      border: 0; border-radius: 22px; padding: 24px; color: var(--text); background: var(--panel);
      box-shadow: 0 20px 60px rgba(80, 55, 70, .25); text-align: center;
    }
    .completion::backdrop { background: rgba(80, 55, 70, .25); }
    @media (orientation: landscape) and (max-height: 520px) {
      :root { --feedback-height: 40px; --tap: 38px; }

      .answer-zone { min-height: 30px; }
      .options { gap: 6px; }

      .option { padding: 4px 7px; border-radius: 11px; font-size: 13px; line-height: 1.15; }

  <script id="practice-data" type="application/json">{"version":1,"title":"会做什么，哪里有什么，今天是什么？｜随堂练习","knowledge":["can + 动词原形｜Can 问，can 回","There is / are｜否定、疑问与简短回答","It is / It's｜天气、时间、日期、星期"],"completion":"三种句子骨架练习完成｜你已经练习了能力、存在以及天气时间表达。","round":{"size":20,"shuffle":false,"quotas":{"can":4,"there":11,"it":5}},"scope":{"mode":"declared","allowedWords":[]},"questions":[{"id":"CP01","category":"can","categoryLabel":"can｜后接动词原形","type":"single","prompt":"She can ___ very well.","options":["swims","swim","to swim","swimming"],"answer":"swim","answerDisplay":"She can swim very well.","correctFeedback":"正确。can 后用原形 swim。","wrongFeedback":"看到 can，先把动作词还原。","explanation":"can 后直接接动词原形，不加三单、to 或 -ing。"},{"id":"CP02","category":"can","categoryLabel":"can｜否定句","type":"single","source":"Tom can ride a bike.","prompt":"选择正确的否定句。","options":["Tom doesn't can ride a bike.","Tom can't rides a bike.","Tom can't ride a bike.","Tom can not to ride a bike."],"answer":"Tom can't ride a bike.","answerDisplay":"Tom can't ride a bike.","correctFeedback":"正确。否定用 can't，ride 保持原形。","wrongFeedback":"can 自己能变否定，不需要 doesn't。","explanation":"结构是主语 + can't + 动词原形。"},{"id":"CP03","category":"can","categoryLabel":"can｜简短回答","type":"single","prompt":"Can Amy dance?","options":["Yes, she does.","Yes, she can.","Yes, she is.","Yes, Amy dance."],"answer":"Yes, she can.","answerDisplay":"Can Amy dance? — Yes, she can.","correctFeedback":"正确。Can 问，用 can 回。","wrongFeedback":"不要把回答换成 do 或 be。","explanation":"简短回答与问句中的情态动词保持一致。"},{"id":"CP04","category":"can","categoryLabel":"can｜和三单对比","type":"single","prompt":"哪一组两个句子都正确？","options":["Leo swims every day. / Leo can swim fast.","Leo swim every day. / Leo can swims fast.","Leo swims every day. / Leo can to swim fast.","Leo can swims every day. / Leo swim fast."],"answer":"Leo swims every day. / Leo can swim fast.","answerDisplay":"Leo swims every day. / Leo can swim fast.","correctFeedback":"正确。普通三单用 swims，can 后用 swim。","wrongFeedback":"先看句子中有没有 can。","explanation":"没有 can 时 Leo 后用三单；有 can 时动作词还原。"},{"id":"CP05","category":"there","categoryLabel":"there be｜表达存在","type":"single","source":"房间里有一只猫。","prompt":"选择正确的句子。","options":["The room is a cat.","There is a cat in the room.","The cat there is in the room.","It is a cat in the room."],"answer":"There is a cat in the room.","answerDisplay":"There is a cat in the room.","correctFeedback":"正确。说“某处有”用 there be。","wrongFeedback":"这句话在说房间里存在什么。","explanation":"单数存在句是 There is + 单数名词 + 地点。"},{"id":"CP06","category":"there","categoryLabel":"there be｜单数用 is","type":"single","prompt":"There ___ a book on the desk.","options":["am","is","are","be"],"answer":"is","answerDisplay":"There is a book on the desk.","correctFeedback":"正确。a book 是单数。","wrongFeedback":"先看 there 后面的名词数量。","explanation":"单数名词 a book 与 There is 搭配。"},{"id":"CP07","category":"there","categoryLabel":"there be｜复数用 are","type":"single","prompt":"选择正确的句子。","options":["There is three chairs in the room.","There are three chair in the room.","There are three chairs in the room.","There three chairs are in the room."],"answer":"There are three chairs in the room.","answerDisplay":"There are three chairs in the room.","correctFeedback":"正确。three chairs 是复数。","wrongFeedback":"数量是 three，be 动词和名词都要检查。","explanation":"复数结构是 There are + 复数名词 + 地点。"},{"id":"CP08","category":"there","categoryLabel":"there be｜不可数用 is","type":"single","prompt":"选择正确的句子。","options":["There are some water in the bottle.","There is some water in the bottle.","There is some waters in the bottle.","There some water is in the bottle."],"answer":"There is some water in the bottle.","answerDisplay":"There is some water in the bottle.","correctFeedback":"正确。water 是不可数名词。","wrongFeedback":"不可数名词在这里按单数形式处理。","explanation":"基础结构是 There is + 不可数名词 + 地点。"},{"id":"CP09","category":"there","categoryLabel":"there be｜单数否定","type":"single","source":"There is a dog in the classroom.","prompt":"选择正确的否定句。","options":["There doesn't a dog in the classroom.","There is not a dog in the classroom.","There not is a dog in the classroom.","There isn't a dog is in the classroom."],"answer":"There is not a dog in the classroom.","answerDisplay":"There is not a dog in the classroom. / There isn't a dog in the classroom.","correctFeedback":"正确。直接在 is 后加 not。","wrongFeedback":"there be 使用自己的 is / are 变否定。","explanation":"There is not 与 There isn't 都是正确基础结构。"},{"id":"CP10","category":"there","categoryLabel":"there be｜复数否定","type":"single","source":"桌上没有书。","prompt":"选择正确的句子。","options":["There isn't books on the desk.","There aren't any books on the desk.","There doesn't have books on the desk.","There are not any book on the desk."],"answer":"There aren't any books on the desk.","answerDisplay":"There aren't any books on the desk.","correctFeedback":"正确。复数 books 与 aren't 搭配。","wrongFeedback":"先检查复数，再检查 isn't / aren't。","explanation":"复数否定是 There aren't + 复数名词 + 地点。"},{"id":"CP11","category":"there","categoryLabel":"there be｜一般疑问句","type":"single","source":"There is a cat in the room.","prompt":"选择正确的一般疑问句。","options":["There is a cat in the room?","Does there a cat in the room?","Is there a cat in the room?","Is a cat there in the room?"],"answer":"Is there a cat in the room?","answerDisplay":"Is there a cat in the room?","correctFeedback":"正确。把 is 放到 there 前。","wrongFeedback":"不需要 does，直接移动 is。","explanation":"There is... 变为 Is there...?"},{"id":"CP12","category":"there","categoryLabel":"there be｜复数简短回答","type":"single","prompt":"Are there two windows in the classroom?","options":["Yes, there are.","Yes, they are.","Yes, there is.","Yes, they do."],"answer":"Yes, there are.","answerDisplay":"Are there two windows in the classroom? — Yes, there are.","correctFeedback":"正确。Are there 问，用 there are 回。","wrongFeedback":"保留问句中的 there 和 are。","explanation":"复数存在句的肯定回答是 Yes, there are."},{"id":"CP13","category":"there","categoryLabel":"there be｜删除双 is","type":"single","source":"There is a television is in the living room.","prompt":"选择正确的修改。","options":["There a television is in the living room.","There is a television in the living room.","There does a television in the living room.","It is a television is in the living room."],"answer":"There is a television in the living room.","answerDisplay":"There is a television in the living room.","correctFeedback":"正确。There is 已经提供 be 动词。","wrongFeedback":"删除多出来的第二个 is。","explanation":"There is 后直接接名词和地点。"},{"id":"CP14","category":"there","categoryLabel":"there be｜看图数量","type":"single","source":"教室图：一块黑板　▯ 窗户　▯ 窗户（高亮两扇窗户）","prompt":"根据图示选择正确的句子。","options":["There is two windows in the classroom.","There are two window in the classroom.","There are two windows in the classroom.","Two windows there are in the classroom."],"answer":"There are two windows in the classroom.","answerDisplay":"There are two windows in the classroom.","correctFeedback":"正确。two windows 是复数。","wrongFeedback":"数量 two 同时影响 are 和名词复数。","explanation":"正确结构是 There are + 数字 + 复数名词 + 地点。"},{"id":"CP15","category":"there","categoryLabel":"there be｜三种结构辨析","type":"single","source":"桌上有三本书。","prompt":"选择正确的句子。","options":["The books can on the desk.","The desk is three books.","There are three books on the desk.","It is three books on the desk."],"answer":"There are three books on the desk.","answerDisplay":"There are three books on the desk.","correctFeedback":"正确。表达存在用 there be。","wrongFeedback":"先判断在说能力、状态，还是存在。","explanation":"这里表达桌上存在三本书，使用复数存在句。"},{"id":"CP16","category":"it","categoryLabel":"it｜四类基础场景","type":"single","prompt":"哪一项不属于本课使用虚位主语 it 的四类场景？","options":["天气","时间","日期和星期","某人会不会游泳"],"answer":"某人会不会游泳","answerDisplay":"某人会不会游泳 → 使用 can","correctFeedback":"正确。能力表达使用 can。","wrongFeedback":"本课四类是天气、时间、日期、星期。","explanation":"it 用于没有具体物品作主语的天气、时间、日期和星期表达。"},{"id":"CP17","category":"it","categoryLabel":"it｜天气句不能漏主语","type":"single","source":"Is sunny today.","prompt":"选择正确的修改。","options":["It is sunny today.","There is sunny today.","She is sunny today.","It sunny is today."],"answer":"It is sunny today.","answerDisplay":"It is sunny today.","correctFeedback":"正确。天气句需要主语 it。","wrongFeedback":"英语完整句子不能直接从 is 开始。","explanation":"天气结构是 It is / It's + 天气形容词。"},{"id":"CP18","category":"it","categoryLabel":"it｜看时钟回答","type":"single","source":"时钟图：🕖（七点整）","prompt":"What time is it?","options":["There is seven o'clock.","It is seven o'clock.","It has seven o'clock.","The time can seven o'clock."],"answer":"It is seven o'clock.","answerDisplay":"What time is it? — It is seven o'clock.","correctFeedback":"正确。说时间使用虚位主语 it。","wrongFeedback":"时间没有具体人物作主语，用 It is...。","explanation":"固定基础回答是 It is / It's + 时间。"},{"id":"CP19","category":"it","categoryLabel":"it｜日期和星期","type":"single","prompt":"哪一组两个问答都正确？","options":["What's the date today? — It's July 24th. / What day is it today? — It's Friday.","What day is it today? — It's July 24th. / What's the date today? — It's friday.","What's the date today? — There is July 24th. / What day is it today? — Friday is it.","What time is it? — It's Friday. / What's the weather like? — It's July 24th."],"answer":"What's the date today? — It's July 24th. / What day is it today? — It's Friday.","answerDisplay":"What's the date today? — It's July 24th. / What day is it today? — It's Friday.","correctFeedback":"正确。date 问日期，day 问星期；Friday 大写。","wrongFeedback":"先区分几月几日和星期几。","explanation":"日期回答月份和序数词；星期名称首字母大写。"},{"id":"CP20","category":"it","categoryLabel":"综合｜三条路线","type":"single","source":"Amy 会游泳。房间里有两只猫。今天是星期五。","prompt":"哪一组三句话都正确？","options":["Amy can swim. / There are two cats in the room. / It's Friday.","Amy can swims. / There is two cats in the room. / There is Friday.","Amy does can swim. / Two cats are there in the room. / Is Friday today.","Amy is swim. / It is two cats in the room. / Friday can today."],"answer":"Amy can swim. / There are two cats in the room. / It's Friday.","answerDisplay":"Amy can swim. / There are two cats in the room. / It's Friday.","correctFeedback":"正确。能力用 can，存在用 there be，星期用 it。","wrongFeedback":"先判断三句话分别表达能力、存在还是星期。","explanation":"三条路线分别是 can + 原形、There are + 复数、It is + 星期。"}]}</script>
  <script>
    (() => {
      "use strict";
      const config = JSON.parse(document.getElementById("practice-data").textContent);
      const byId = (id) => document.getElementById(id);
      const ui = {
        title: byId("pageTitle"), knowledge: byId("knowledgeStrip"), progress: byId("progressText"),
        category: byId("categoryText"), prompt: byId("promptText"), source: byId("sourceLine"),
        answerZone: byId("answerZone"), rule: byId("ruleLine"), options: byId("options"),
        check: byId("checkButton"), show: byId("showAnswerButton"), next: byId("nextButton"),
        feedback: byId("feedback"), dialog: byId("completionDialog"), completion: byId("completionText")
      };
      const state = { round: [], index: 0, selected: [], solved: [], revealed: [], attempts: [], firstTry: [], wrongEver: [] };

      function shuffle(values) {
        const copy = [...values];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }
      function buildRound() {
        if (config.round.shuffle === false) return config.questions.slice(0, config.round.size);
        if (Array.isArray(config.round.groups)) {
          return config.round.groups.flatMap((group) => {
            const ids = new Set(group.ids || []);
            let items = config.questions.filter((q) => ids.has(q.id));
            if (group.shuffle !== false) items = shuffle(items);
            return items;
          }).slice(0, config.round.size);
        }
        const picked = [];
        for (const [category, count] of Object.entries(config.round.quotas)) {
          picked.push(...shuffle(config.questions.filter((q) => q.category === category)).slice(0, count));
        }
        return shuffle(picked);
      }
      function answerIndices(question) {
        const answers = Array.isArray(question.answer) ? question.answer : [question.answer];
        const used = new Set();
        return answers.map((value) => {
          if (typeof value === "number") return value;
          const index = question.options.findIndex((option, optionIndex) => option === value && !used.has(optionIndex));
          used.add(index); return index;
        });
      }
      function answerValues(question) {
        return answerIndices(question).map((index) => question.options[index]);
      }
      function selectedValues(question) {
        return state.selected.map((index) => question.options[index]);
      }
      function isCorrect(question) {
        const selected = selectedValues(question);
        const answers = answerValues(question);
        if (question.type === "order") {
          const indices = answerIndices(question);
          return state.selected.length === indices.length && state.selected.every((value, index) => value === indices[index]);
        }
        if (question.type === "multi") return selected.length === answers.length && selected.every((value) => answers.includes(value));
        return selected.length === 1 && selected[0] === answers[0];
      }
      function completeAnswer(question) {
        return question.answerDisplay || answerValues(question).join(question.type === "order" ? " " : "、");
      }
      function feedback(type, message) {
        ui.feedback.className = `feedback ${type || ""}`.trim();
        ui.feedback.textContent = `${type === "correct" ? "✓" : type === "wrong" ? "×" : "△"} ${message}`;
      }
      function updateAnswerZone(question) {
        if (question.type !== "order") return;
        ui.answerZone.textContent = state.selected.length ? selectedValues(question).join(" ") : "按顺序点击词块，句子会在这里组成。";
      }
      function renderQuestion() {
        const q = state.round[state.index];
        state.selected = [];
        ui.progress.textContent = `第 ${state.index + 1} / ${state.round.length} 题`;
        ui.category.textContent = q.categoryLabel || q.category;
        ui.prompt.textContent = q.prompt;
        ui.source.hidden = !q.source; ui.source.classList.remove("visual-scene"); ui.source.textContent = q.source || "";
        if (q.id === "CP14") {
          ui.source.classList.add("visual-scene");
          ui.source.innerHTML = "<svg viewBox='0 0 520 110' role='img' aria-label='教室里有一块黑板和两扇窗户'><rect x='8' y='8' width='504' height='94' rx='16' fill='#f4f1ff'/><rect x='176' y='20' width='168' height='48' rx='8' fill='#568b76'/><g fill='#cbe7f6' stroke='#fff' stroke-width='5'><rect x='48' y='24' width='62' height='58' rx='7'/><rect x='410' y='24' width='62' height='58' rx='7'/></g><path d='M79 24v58M441 24v58' stroke='#fff' stroke-width='5'/><text x='260' y='95' text-anchor='middle' font-size='18' font-weight='800' fill='#665f72'>一块黑板 · 两扇窗户</text></svg>";
        } else if (q.id === "CP18") {
          ui.source.classList.add("visual-scene");
          ui.source.innerHTML = "<svg viewBox='0 0 300 110' role='img' aria-label='七点整的时钟'><circle cx='150' cy='55' r='45' fill='#fff' stroke='#9384cb' stroke-width='7'/><path d='M150 55V20M150 55l-24 24' stroke='#9384cb' stroke-width='8' stroke-linecap='round'/><circle cx='150' cy='55' r='5' fill='#9384cb'/><text x='225' y='62' font-size='22' font-weight='800' fill='#665f72'>7:00</text></svg>";
        }
        ui.rule.hidden = !q.rule; ui.rule.textContent = q.rule || "";
        ui.answerZone.hidden = q.type !== "order"; updateAnswerZone(q);
        ui.options.classList.toggle("order-options", q.type === "order");
        ui.options.replaceChildren(...q.options.map((option, index) => {
          const button = document.createElement("button");
          button.type = "button"; button.className = "option"; button.dataset.optionIndex = String(index);
          button.setAttribute("aria-pressed", "false"); button.textContent = option;
          button.addEventListener("click", () => {
            if (state.solved[state.index]) return;
            if (q.type === "multi") {
              state.selected = state.selected.includes(index) ? state.selected.filter((item) => item !== index) : [...state.selected, index];
            } else if (q.type === "order") {
              if (state.selected.includes(index)) state.selected = state.selected.filter((item) => item !== index);
              else state.selected.push(index);
            } else state.selected = [index];
            ui.options.querySelectorAll(".option").forEach((item) => {
              const picked = state.selected.includes(Number(item.dataset.optionIndex));
              item.setAttribute("aria-pressed", String(picked));
              item.classList.toggle("order-picked", q.type === "order" && picked);
            });
            updateAnswerZone(q);
            feedback("", "已选择，点击“检查答案”。");
          });
          return button;
        }));
        ui.next.disabled = true;
        ui.check.disabled = false; ui.show.disabled = false;
        feedback("", q.type === "multi" ? "请选择全部正确答案。" : q.type === "order" ? "请按正确语序点击全部词块。" : "请选择答案。");
      }
      function startRound() {
        state.round = buildRound(); state.index = 0; state.selected = [];
        state.solved = Array(state.round.length).fill(false); state.revealed = Array(state.round.length).fill(false);
        state.attempts = Array(state.round.length).fill(0); state.firstTry = Array(state.round.length).fill(false);
        state.wrongEver = Array(state.round.length).fill(false);
        ui.dialog.dataset.complete = "false";
        if (ui.dialog.open) ui.dialog.close();
        renderQuestion();
      }
      function checkAnswer() {
        if (!state.selected.length) return feedback("wrong", "请先选择答案。");
        if (state.solved[state.index]) return;
        const q = state.round[state.index];
        state.attempts[state.index] += 1;
        if (isCorrect(q)) {
          state.solved[state.index] = true;
          state.firstTry[state.index] = state.attempts[state.index] === 1 && !state.revealed[state.index];
          ui.options.querySelectorAll(".option").forEach((item) => {
            if (answerValues(q).includes(item.textContent)) item.classList.add("correct-option");
          });
          feedback("correct", `${q.correctFeedback || "正确。"} ${q.explanation || ""}`.trim());
          ui.check.disabled = true; ui.show.disabled = true; ui.next.disabled = false;
        } else {
          state.wrongEver[state.index] = true;
          state.selected.forEach((index) => ui.options.querySelector(`[data-option-index="${index}"]`)?.classList.add("wrong-option"));
          feedback("wrong", q.wrongFeedback || "再看助动词、主语和动词原形。你可以继续修改。");
          state.selected = [];
          ui.options.querySelectorAll(".option").forEach((item) => { item.setAttribute("aria-pressed", "false"); item.classList.remove("order-picked"); });
          updateAnswerZone(q);
        }
      }
      function showAnswer() {
        const q = state.round[state.index];
        state.revealed[state.index] = true; state.solved[state.index] = true;
        feedback("correct", `答案：${completeAnswer(q)}。${q.explanation || ""}`);
        ui.answerZone.hidden = false; ui.answerZone.textContent = completeAnswer(q);
        ui.options.querySelectorAll(".option").forEach((item) => {
          if (answerValues(q).includes(item.textContent)) item.classList.add("correct-option");
        });
        ui.check.disabled = true; ui.show.disabled = true;
        ui.next.disabled = false;
      }
      function nextQuestion() {
        if (state.index + 1 < state.round.length) { state.index += 1; renderQuestion(); return; }
        const first = state.firstTry.filter(Boolean).length;
        const final = state.solved.filter(Boolean).length;
        const wrongIds = state.round.filter((_, index) => state.wrongEver[index]).map((question) => question.id);
        ui.completion.textContent = `${config.completion || "本轮完成。"} 首次正确 ${first} / ${state.round.length}，最终正确 ${final} / ${state.round.length}。错题题号：${wrongIds.length ? wrongIds.join("、") : "无"}。`;
        ui.dialog.dataset.complete = "true";
        if (typeof ui.dialog.showModal === "function") ui.dialog.showModal(); else ui.dialog.setAttribute("open", "");
      }

      ui.title.textContent = config.title;
      ui.knowledge.replaceChildren(...config.knowledge.map((text) => {
        const chip = document.createElement("span"); chip.className = "knowledge-chip"; chip.textContent = text; return chip;
      }));
      byId("newRoundButton").addEventListener("click", startRound);
      byId("restartButton").addEventListener("click", startRound);
      ui.check.addEventListener("click", checkAnswer);
      ui.show.addEventListener("click", showAnswer);
      ui.next.addEventListener("click", nextQuestion);
      window.__LESSON_PREP_QA__ = {
        state: () => ({ index: state.index, total: state.round.length, complete: ui.dialog.dataset.complete === "true", id: state.round[state.index]?.id }),
        selectWrong: () => {
          const q = state.round[state.index];
          const correct = new Set(answerIndices(q));
          const wrongIndex = q.options.findIndex((_, index) => !correct.has(index));
          state.selected = wrongIndex >= 0 ? [wrongIndex] : [];
          ui.options.querySelectorAll(".option").forEach((item) => item.setAttribute("aria-pressed", String(state.selected.includes(Number(item.dataset.optionIndex)))));
          updateAnswerZone(q);
        },
        solveCurrent: () => {
          const q = state.round[state.index];
          state.selected = answerIndices(q).filter((index) => index >= 0);
          ui.options.querySelectorAll(".option").forEach((item) => item.setAttribute("aria-pressed", String(state.selected.includes(Number(item.dataset.optionIndex)))));
          updateAnswerZone(q);
        }
      };
      startRound();
    })();
  </script>
