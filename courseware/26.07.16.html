<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>语法车站｜代词 + be 动词</title>
<style>
:root{
  --bg:#fff7f4;--panel:#fffdf9;--ink:#54495a;--muted:#8e8291;--line:#eadfe7;
  --pink:#ee9fb5;--pink-soft:#fde7ee;--purple:#a895cf;--purple-soft:#eee8fa;
  --mint:#82c7af;--mint-soft:#dff3ec;--sky:#86bde0;--sky-soft:#e4f2fb;
  --yellow:#e5c978;--yellow-soft:#fff3cf;--orange:#e9a56b;--orange-soft:#fff0df;

  --shadow:0 12px 30px rgba(95,70,95,.12);--radius:24px;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;-webkit-text-size-adjust:100%;touch-action:manipulation}
button{font:inherit}
button:focus-visible,.answer-card:focus-visible,.jump-btn:focus-visible{outline:3px solid #f1bdcc;outline-offset:2px}

.topbar{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px;padding:9px 14px;background:rgba(255,253,249,.97);border:1px solid var(--line);border-radius:21px;box-shadow:var(--shadow)}
.title-wrap{min-width:0;display:flex;align-items:center;gap:11px}.logo{width:44px;height:44px;flex:0 0 44px;border-radius:15px;display:grid;place-items:center;font-size:23px;background:var(--yellow-soft);border:1px solid #efd99c}
h1{margin:0;font-size:clamp(21px,2.25vw,30px);line-height:1.05;color:#a45c76;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.subtitle{margin-top:3px;color:var(--muted);font-size:12px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top-status{display:flex;gap:7px;align-items:center;white-space:nowrap}.pill{min-height:38px;padding:7px 12px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-weight:900}.pill.module{background:var(--purple-soft);color:#6c5a95}.pill.progress{background:var(--mint-soft);color:#4f8f78}
.jumpbar{min-width:0;display:flex;justify-content:center;align-items:center;gap:6px;padding:2px 7px;overflow-x:auto;scrollbar-width:none}.jumpbar::-webkit-scrollbar{display:none}.jump-btn{width:33px;height:33px;min-width:33px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--muted);font-weight:900;cursor:pointer;box-shadow:0 3px 8px rgba(90,70,90,.05)}.jump-btn.current{background:var(--pink);border-color:var(--pink);color:#fff;transform:translateY(-1px)}.jump-btn.done{background:var(--good-soft);border-color:#b7dec4;color:#4f8c66}.jump-btn.tried:not(.done){background:var(--yellow-soft);border-color:#ead493;color:#8b702d}
.stage{min-width:0;min-height:0;overflow:hidden;position:relative;background:rgba(255,253,249,.97);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.slide{width:100%;height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:9px;padding:12px 16px}.question-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.kicker{font-size:12px;color:#8c7f8f;font-weight:900;letter-spacing:.4px}.question-title{margin:3px 0 0;font-size:clamp(18px,1.9vw,26px);line-height:1.25;color:#594d61}.level{flex:0 0 auto;padding:5px 10px;border-radius:999px;background:var(--yellow-soft);border:1px solid #efdca4;color:#846c2f;font-size:11px;font-weight:900}.level.challenge{background:var(--purple-soft);border-color:#d8cceb;color:#6f5c96}
.workarea{min-width:0;min-height:0;overflow:hidden;display:grid;grid-template-columns:minmax(275px,.83fr) minmax(0,1.52fr);gap:16px;align-items:stretch}.prompt-panel,.answer-panel{min-width:0;min-height:0;border-radius:25px;padding:14px;position:relative;overflow:hidden}.prompt-panel{background:linear-gradient(160deg,#fff,#fff6fa);border:2px solid #efd6e1;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:10px}.prompt-panel:before{content:"";position:absolute;inset:auto -18% -42% -18%;height:72%;background:radial-gradient(ellipse,#f9e3ea 0%,rgba(249,227,234,.2) 52%,transparent 70%)}.panel-label{z-index:1;display:flex;align-items:center;justify-content:space-between;gap:9px;font-size:13px;font-weight:900;color:#8f6678}.listen-btn{min-height:36px;border:0;border-radius:12px;padding:6px 10px;background:var(--sky-soft);color:#4e7892;font-weight:900;cursor:pointer}.prompt-card{z-index:1;align-self:center;min-width:0;padding:22px 17px;border-radius:22px;background:#fffdf5;border:2px solid #e7c997;box-shadow:0 10px 18px rgba(135,95,65,.1);position:relative;text-align:center}.prompt-card:before{content:"";position:absolute;inset:7px;border:2px dashed rgba(210,143,100,.35);border-radius:16px;pointer-events:none}.prompt-main{position:relative;z-index:1;font-size:clamp(25px,3vw,41px);font-weight:950;line-height:1.3;overflow-wrap:anywhere}.prompt-sub{position:relative;z-index:1;margin-top:8px;font-size:14px;color:var(--muted);font-weight:800;line-height:1.45}.hint-card{z-index:1;border-radius:15px;background:#fff8fb;border:1px solid #f0dce5;padding:9px 11px;font-size:12px;line-height:1.5;color:var(--muted);font-weight:750}.hint-card b{color:#8d6878}
.answer-panel{background:linear-gradient(180deg,#eef8ff 0 37%,#eaf6e3 37% 100%);border:2px solid #d9eaf5;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:9px}.answer-panel:before,.answer-panel:after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.84)}.answer-panel:before{width:100px;height:28px;left:7%;top:9%}.answer-panel:after{width:130px;height:33px;right:7%;top:15%}.answer-head{z-index:1;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:14px;font-weight:900;color:#5d7a8a}.answer-note{font-size:11px;color:#788b92;font-weight:800;background:rgba(255,255,255,.75);border:1px solid rgba(110,150,160,.17);padding:4px 7px;border-radius:999px}.options{z-index:1;min-width:0;min-height:0;display:grid;gap:10px;align-content:center}.options.grid-7{grid-template-columns:repeat(4,minmax(0,1fr))}.options.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.options.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.options.stack{grid-template-columns:1fr;gap:8px}.answer-card{min-width:0;min-height:66px;border:2px solid rgba(130,145,155,.18);border-radius:18px;background:rgba(255,255,255,.9);padding:10px 12px;color:#625867;font-weight:900;text-align:center;cursor:pointer;box-shadow:0 6px 13px rgba(70,85,95,.08);transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease,background .15s ease;overflow-wrap:anywhere;display:grid;place-items:center}.answer-card:hover,.answer-card.selected{transform:translateY(-3px)}.answer-card.selected{border-color:var(--purple);box-shadow:0 0 0 4px rgba(169,149,207,.18),0 8px 16px rgba(70,85,95,.1)}.answer-card.wrong{background:var(--bad-soft);border-color:#e9a49d;animation:shake .35s ease}.answer-card.correct,.answer-card.answer{background:var(--good-soft);border-color:#91cfa5}.answer-card .big{font-size:clamp(24px,2.6vw,37px);line-height:1.1}.answer-card .small{margin-top:6px;font-size:11px;color:var(--muted);font-weight:800;line-height:1.3}.train-card{min-height:205px;grid-template-rows:1fr auto auto;gap:4px;padding:12px 10px 10px}.engine{width:min(126px,86%);height:92px;margin:auto;position:relative}.engine-body{position:absolute;left:15%;right:4%;bottom:17px;height:50px;background:#fff;border:3px solid var(--train);border-radius:17px}.engine-cab{position:absolute;right:10%;top:7px;width:44%;height:42px;background:#fff;border:3px solid var(--train);border-radius:14px 14px 7px 7px}.engine-stack{position:absolute;left:19%;top:7px;width:22px;height:42px;background:var(--train);border-radius:7px 7px 2px 2px}.engine-wheel{position:absolute;bottom:0;width:30px;height:30px;border-radius:50%;background:#fff;border:5px solid var(--train)}.engine-wheel.w1{left:25%}.engine-wheel.w2{right:14%}.train-word{font-size:clamp(30px,3vw,43px);color:var(--train);font-weight:950}.train-rule{font-size:11px;color:var(--muted);font-weight:800}.train-a{--train:#79acd5}.train-b{--train:#e3a066}.train-c{--train:#7fb489}.sentence-card{min-height:65px;display:flex;align-items:center;justify-content:center;font-size:clamp(17px,1.8vw,24px);line-height:1.35}.dialogue-card{min-height:88px;border-radius:28px}.dialogue-card:after{content:"";position:absolute}.reason-chip{display:inline-flex;align-items:center;padding:3px 7px;border-radius:999px;background:var(--yellow-soft);font-size:10px;color:#80682e;margin-top:5px}
.answer-footer{z-index:1;text-align:center;color:#6e7f72;font-size:11px;font-weight:850;background:rgba(255,255,255,.72);border:1px solid rgba(110,150,120,.17);padding:5px 9px;border-radius:999px}
.feedback{min-height:48px;border-radius:16px;border:1px solid var(--line);background:#fffafc;display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:9px;padding:7px 12px}.feedback.good{background:var(--good-soft);border-color:#b4ddc2}.feedback.bad{background:var(--bad-soft);border-color:#efbbb4}.feedback-icon{font-size:21px}.feedback-main{font-size:13px;font-weight:900;line-height:1.35}.feedback-detail{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.controls{display:grid;grid-template-columns:auto auto minmax(0,1fr) auto auto auto;align-items:center;gap:8px}.btn{min-height:44px;border:0;border-radius:14px;padding:8px 15px;font-weight:900;cursor:pointer;transition:transform .12s ease,opacity .12s ease}.btn:active{transform:translateY(1px)}.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--muted)}.btn.secondary{background:var(--purple-soft);color:#6b5792}.btn.answer{background:var(--sky-soft);color:#4d7893}.btn.primary{background:var(--mint);color:#fff;box-shadow:0 6px 14px rgba(100,175,145,.22)}.btn.next{background:var(--pink);color:#fff;box-shadow:0 6px 14px rgba(220,130,155,.2)}.btn:disabled{opacity:.35;cursor:not-allowed}.control-note{text-align:center;color:var(--muted);font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.finish-card{position:absolute;inset:9%;z-index:10;border-radius:28px;background:rgba(255,253,249,.98);border:2px solid #ead6e0;box-shadow:0 20px 45px rgba(90,65,90,.2);display:grid;place-items:center;text-align:center;padding:25px}.finish-card[hidden]{display:none}.finish-card h2{margin:0 0 7px;color:#a45c76;font-size:clamp(25px,2.8vw,38px)}.finish-card p{margin:4px 0;color:var(--muted);font-weight:750}.finish-card .big{font-size:49px}.stamps{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:15px 0}.stamp{padding:8px 12px;border:2px dashed #d3b8c7;border-radius:15px;background:#fff7fb;color:#8f6076;font-weight:900}
@keyframes shake{25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}}
@media (orientation:landscape) and (max-height:600px){.app{gap:5px;padding:6px 8px}.topbar{padding:6px 9px;border-radius:15px}.logo{width:36px;height:36px;flex-basis:36px;border-radius:11px;font-size:19px}h1{font-size:19px}.subtitle{font-size:9px}.pill{min-height:32px;padding:5px 8px;font-size:11px}.jumpbar{padding:0 4px;gap:4px}.jump-btn{width:28px;height:28px;min-width:28px;border-radius:8px;font-size:11px}.slide{gap:5px;padding:7px 9px}.question-title{font-size:16px}.kicker{font-size:9px}.level{padding:3px 7px;font-size:9px}.workarea{grid-template-columns:minmax(220px,.78fr) minmax(0,1.6fr);gap:8px}.prompt-panel,.answer-panel{padding:8px;border-radius:17px}.prompt-card{padding:12px 10px;border-radius:14px}.prompt-main{font-size:21px}.prompt-sub{font-size:10px}.hint-card{padding:5px 7px;font-size:9px}.panel-label,.answer-head{font-size:10px}.listen-btn{min-height:29px;font-size:10px}.options{gap:5px}.answer-card{min-height:45px;padding:5px 7px;border-radius:11px;font-size:11px}.answer-card .big{font-size:22px}.answer-card .small,.train-rule{font-size:8px}.train-card{min-height:128px;padding:6px}.engine{height:58px}.engine-body{height:31px;bottom:11px;border-width:2px}.engine-cab{height:29px;border-width:2px}.engine-stack{width:14px;height:28px}.engine-wheel{width:19px;height:19px;border-width:3px}.train-word{font-size:24px}.sentence-card{min-height:38px;font-size:13px}.dialogue-card{min-height:48px}.answer-footer{font-size:8px;padding:3px 6px}.feedback{min-height:36px;padding:4px 8px}.feedback-icon{font-size:16px}.feedback-main{font-size:10px}.feedback-detail{font-size:8px}.controls{gap:5px}.btn{min-height:35px;padding:5px 9px;border-radius:10px;font-size:10px}.control-note{font-size:8px}}
@media (orientation:portrait) and (max-width:767px){.app{position:fixed;left:0;top:100dvh;width:100dvh;height:100vw;transform:rotate(-90deg);transform-origin:top left}}
@media (min-width:1400px){.app{max-width:1500px;margin:0 auto}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="title-wrap"><div class="logo">🚉</div><div><h1>语法车站｜代词 + be 动词</h1><div class="subtitle">先认清主语，再帮它找到正确的代词和 be 动词</div></div></div>
    <div class="top-status"><div class="pill module" id="modulePill">身份变身</div><div class="pill progress" id="progressPill">1 / 12</div></div>
  </header>
  <nav class="jumpbar" id="jumpbar" aria-label="题目跳转"></nav>
  <main class="stage">
    <section class="slide">
      <div class="question-head"><div><div class="kicker" id="kicker">第 1 题</div><h2 class="question-title" id="questionTitle">选择正确答案。</h2></div><div class="level" id="levelBadge">基础</div></div>
      <div class="workarea">
        <section class="prompt-panel"><div class="panel-label"><span id="promptLabel">🎫 今日乘客</span><button class="listen-btn" id="listenBtn" type="button">🔊 听一听</button></div><div class="prompt-card"><div class="prompt-main" id="promptMain"></div><div class="prompt-sub" id="promptSub"></div></div><div class="hint-card" id="hintCard"><b>判断提示：</b><span id="hintText"></span></div></section>
        <section class="answer-panel"><div class="answer-head"><span id="answerHead">请选择答案</span><span class="answer-note" id="answerNote">点击后可修改</span></div><div class="options" id="options"></div><div class="answer-footer" id="answerFooter">作答前所有选项保持同样样式，不会提示答案。</div></section>
      </div>
      <div class="feedback" id="feedback" aria-live="polite"><div class="feedback-icon" id="feedbackIcon">△</div><div><div class="feedback-main" id="feedbackMain">选择一个答案，再点击“检查答案”。</div><div class="feedback-detail" id="feedbackDetail">检查前可以直接改选。</div></div></div>
    </section>
    <section class="finish-card" id="finishCard" hidden><div><div class="big">🎉</div><h2>语法车站通关啦！</h2><p id="finishSummary"></p><div class="stamps"><span class="stamp">代词达人</span><span class="stamp">配对车长</span><span class="stamp">句子魔法师</span><span class="stamp">语法侦探</span></div><p><b>记住：</b>I 用 am，单数常用 is，复数和 you 用 are。</p><button class="btn primary" id="restartBtn" type="button">重新开始</button></div></section>
  </main>
  <footer class="controls"><button class="btn ghost" id="prevBtn" type="button">← 上一题</button><button class="btn secondary" id="resetBtn" type="button">重做本题</button><div class="control-note" id="controlNote">完成选择后点击“检查答案”</div><button class="btn answer" id="showBtn" type="button">显示答案</button><button class="btn primary" id="checkBtn" type="button">检查答案</button><button class="btn next" id="nextBtn" type="button">下一题 →</button></footer>
</div>
<script>
const QUESTIONS=[
 {stage:"身份变身",level:"基础",type:"pronoun",title:"把名字换成正确的人称代词。",prompt:"Lucy",sub:"Lucy 是一位女孩。",speak:"Lucy",hint:"先判断 Lucy 是男孩、女孩，还是物品。",answer:"she",options:["I","you","he","she","it","we","they"],explain:"Lucy 是女孩，名字在句子中可以换成 she。",wrong:"先判断这个主语指的是谁。"},
 {stage:"身份变身",level:"基础",type:"pronoun",title:"把名词主语换成正确的人称代词。",prompt:"the little dog",sub:"一只小狗",speak:"the little dog",hint:"一只动物作为单数主语，通常用 it。",answer:"it",options:["they","he","it","we","she","you","I"],explain:"the little dog 是一只动物，用 it。",wrong:"先看它是一个还是多个，再看是不是人。"},
 {stage:"身份变身",level:"提升",type:"pronoun",title:"并列主语应该换成哪个代词？",prompt:"Tom and Jack",sub:"Tom 和 Jack 两个人",speak:"Tom and Jack",hint:"and 把两个人连在一起，主语是复数。",answer:"they",options:["we","they","he","you","it","she","I"],explain:"Tom and Jack 是两个人，用 they。",wrong:"看到 and，先数一数主语有几个人。"},
 {stage:"三列车",level:"基础",type:"train",title:"这张主语卡应该坐哪一列车？",prompt:"I",sub:"第一人称“我”",speak:"I am ready.",hint:"I 有一个固定搭档。",answer:"am",options:["are","am","is"],explain:"I 和 am 是固定搭档。",wrong:"想一想：I am ready. 这句话怎么说？"},
 {stage:"三列车",level:"基础",type:"train",title:"这张主语卡应该坐哪一列车？",prompt:"My new teacher",sub:"我的新老师，一个人",speak:"My new teacher is kind.",hint:"teacher 前面虽然有 my 和 new，但真正的中心词仍是单数 teacher。",answer:"is",options:["am","are","is"],explain:"My new teacher 是单数主语，使用 is。",wrong:"先找中心词 teacher，再判断一个还是多个。"},
 {stage:"三列车",level:"提升",type:"train",title:"这张主语卡应该坐哪一列车？",prompt:"The books on the desk",sub:"桌子上的那些书",speak:"The books on the desk are new.",hint:"on the desk 是补充地点，真正的主语中心词是 books。",answer:"are",options:["is","are","am"],explain:"books 是复数，使用 are。",wrong:"暂时拿开 on the desk，只看 books。"},
 {stage:"三列车",level:"挑战",type:"train",title:"不要被补充信息干扰。",prompt:"The boy with two dogs",sub:"带着两只狗的那个男孩",speak:"The boy with two dogs is happy.",hint:"with two dogs 只是补充信息，真正的主语是 The boy。",answer:"is",options:["are","is","am"],explain:"真正的主语 The boy 是单数，所以用 is。",wrong:"把 with two dogs 暂时拿开，再判断 The boy。"},
 {stage:"句子变身",level:"基础",type:"sentence",title:"把肯定句变成否定句。",prompt:"She is busy.",sub:"请选择正确的否定句。",speak:"She is busy.",hint:"be 动词句变否定，直接在 be 动词后加 not。",answer:"She is not busy.",options:["She not is busy.","She is not busy.","She does not busy."],explain:"not 放在 is 后面：She is not busy.",wrong:"not 应该跟在 be 动词后面。"},
 {stage:"句子变身",level:"提升",type:"sentence",title:"把肯定句变成一般疑问句。",prompt:"Tom is at home.",sub:"请选择正确的一般疑问句。",speak:"Tom is at home.",hint:"be 动词句变疑问，把 be 动词提到主语前面。",answer:"Is Tom at home?",options:["Does Tom is at home?","Tom is at home?","Is Tom at home?"],explain:"is 提到 Tom 前面，并把句号改成问号。",wrong:"检查 be 动词有没有站到主语前面。"},
 {stage:"句子变身",level:"挑战",type:"sentence",title:"把肯定句变成一般疑问句。",prompt:"The girls are ready.",sub:"请选择正确的一般疑问句。",speak:"The girls are ready.",hint:"主语是复数 girls，原句中的 are 要提到句首。",answer:"Are the girls ready?",options:["Is the girls ready?","Are the girls ready?","Do the girls are ready?"],explain:"are 提到复数主语 the girls 前面。",wrong:"先保留原来的 are，再把它移到主语前。"},
 {stage:"对话与侦探",level:"提升",type:"dialogue",title:"选择正确的简短回答。",prompt:"Is Lucy happy?",sub:"回答：是的，她很开心。",speak:"Is Lucy happy? Yes, she is.",hint:"回答时名字 Lucy 通常换成代词 she，并继续使用 is。",answer:"Yes, she is.",options:["Yes, Lucy am.","Yes, she is.","Yes, she are."],explain:"Lucy 换成 she，问句用 is，回答也用 is。",wrong:"先把 Lucy 换成正确代词，再看问句里的 be 动词。"},
 {stage:"对话与侦探",level:"挑战",type:"correction",title:"语法小侦探：找出正确修改。",prompt:"My parents is busy.",sub:"请选择改正后的句子。",speak:"My parents are busy.",hint:"parents 表示父母两个人，是复数主语。",answer:"My parents are busy.",options:["My parents am busy.","My parents are busy.","My parents is busy."],explain:"parents 是复数，be 动词应该使用 are。",wrong:"先判断 parents 是一个人还是多个人。"}
];
const state={current:0,selected:Array(QUESTIONS.length).fill(null),done:Array(QUESTIONS.length).fill(false),tried:Array(QUESTIONS.length).fill(false),shown:Array(QUESTIONS.length).fill(false),attempts:Array(QUESTIONS.length).fill(0)};
const $=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function buildJumpbar(){const bar=$("jumpbar");bar.innerHTML="";QUESTIONS.forEach((q,i)=>{const b=document.createElement("button");b.type="button";b.className="jump-btn";b.textContent=i+1;b.setAttribute("aria-label",`第 ${i+1} 题`);b.addEventListener("click",()=>{state.current=i;render()});bar.appendChild(b)})}
function optionClass(q){if(q.type==="pronoun")return "grid-7";if(q.type==="train"||q.type==="sentence"||q.type==="dialogue"||q.type==="correction")return "grid-3";return "stack"}
function trainHTML(word,index){const cls=["train-a","train-b","train-c"][index%3];const rule=word==="am"?"只和 I 搭配":word==="is"?"单数 / he / she / it":"复数 / you / we / they";return `<div class="engine ${cls}"><div class="engine-stack"></div><div class="engine-cab"></div><div class="engine-body"></div><div class="engine-wheel w1"></div><div class="engine-wheel w2"></div></div><div class="train-word ${cls}">${esc(word)}</div><div class="train-rule">${esc(rule)}</div>`}
function renderOptions(q){const wrap=$("options");wrap.className=`options ${optionClass(q)}`;wrap.innerHTML="";q.options.forEach((opt,i)=>{const b=document.createElement("button");b.type="button";b.className="answer-card"+(q.type==="train"?" train-card":"")+(q.type==="sentence"?" sentence-card":"")+(q.type==="dialogue"?" dialogue-card":"");if(q.type==="train")b.innerHTML=trainHTML(opt,i);else if(q.type==="pronoun")b.innerHTML=`<div class="big">${esc(opt)}</div>`;else b.innerHTML=`<div>${esc(opt)}</div>`;if(state.selected[state.current]===opt)b.classList.add("selected");if(state.done[state.current]&&opt===q.answer)b.classList.add("correct");if(state.tried[state.current]&&!state.done[state.current]&&state.selected[state.current]===opt)b.classList.add("wrong");if(state.shown[state.current]&&opt===q.answer)b.classList.add("answer");b.addEventListener("click",()=>{if(state.done[state.current])return;state.selected[state.current]=opt;state.tried[state.current]=false;state.shown[state.current]=false;render()});wrap.appendChild(b)})}
function renderFeedback(q){
  const fb=$("feedback");
  fb.className="feedback";
  if(state.done[state.current]){
    fb.classList.add("good");
    $("feedbackIcon").textContent="✓";
    $("feedbackMain").textContent="答对了！";
    $("feedbackDetail").textContent=q.explain;
    $("controlNote").textContent="本题已完成，可以进入下一题";
    return;
  }
  if(state.tried[state.current] && !state.shown[state.current]){
    fb.classList.add("bad");
    $("feedbackIcon").textContent="!";
    $("feedbackMain").textContent="再想一想。";
    $("feedbackDetail").textContent=q.wrong;
    $("controlNote").textContent="根据提示修改后，再次检查";
    return;
  }
  if(state.shown[state.current]){
    $("feedbackIcon").textContent="◆";
    $("feedbackMain").textContent=`答案：${q.answer}`;
    $("feedbackDetail").textContent=q.explain;
    $("controlNote").textContent="已显示答案，可以继续练习";
    return;
  }
  $("feedbackIcon").textContent="△";
  if(state.selected[state.current]){
    $("feedbackMain").textContent="已经选好，请点击检查答案。";
  }else{
    $("feedbackMain").textContent="选择一个答案，再点击检查答案。";
  }
  $("feedbackDetail").textContent="检查前可以直接改选。";
  $("controlNote").textContent="完成选择后点击检查答案";
}
function render(){const q=QUESTIONS[state.current];$("modulePill").textContent=q.stage;$("progressPill").textContent=`${state.current+1} / ${QUESTIONS.length}`;$("kicker").textContent=`第 ${state.current+1} 题 · ${q.stage}`;$("questionTitle").textContent=q.title;$("levelBadge").textContent=q.level;$("levelBadge").className="level"+(q.level==="挑战"?" challenge":"");$("promptMain").textContent=q.prompt;$("promptSub").textContent=q.sub;$("hintText").textContent=q.hint;$("promptLabel").textContent=q.type==="pronoun"?"🪪 身份卡":q.type==="train"?"🎫 今日乘客":q.type==="sentence"?"✨ 原句":q.type==="dialogue"?"💬 今日对话":"🔎 错误句子";$("answerHead").textContent=q.type==="train"?"🚉 请选择正确列车":q.type==="pronoun"?"🪪 请选择正确代词":q.type==="sentence"?"✨ 请选择变身结果":q.type==="dialogue"?"💬 请选择正确回答":"🔎 请选择正确修改";$("answerNote").textContent=q.type==="train"?"列车位置会变化":"点击后可修改";$("answerFooter").textContent=state.done[state.current]?q.explain:"作答前所有选项保持同样样式，不会提示答案。";renderOptions(q);renderFeedback(q);document.querySelectorAll(".jump-btn").forEach((b,i)=>{b.className="jump-btn"+(i===state.current?" current":"")+(state.done[i]?" done":"")+(!state.done[i]&&state.tried[i]?" tried":"")});$("prevBtn").disabled=state.current===0;$("nextBtn").textContent=state.current===QUESTIONS.length-1?"完成 →":"下一题 →";$("checkBtn").disabled=!state.selected[state.current]||state.done[state.current];$("showBtn").disabled=state.done[state.current];$("finishCard").hidden=true}
function check(){const q=QUESTIONS[state.current];if(!state.selected[state.current])return;state.tried[state.current]=true;state.attempts[state.current]++;state.done[state.current]=state.selected[state.current]===q.answer;state.shown[state.current]=false;render()}
function showAnswer(){const q=QUESTIONS[state.current];state.shown[state.current]=true;state.tried[state.current]=true;state.selected[state.current]=q.answer;render()}
function resetQuestion(){const i=state.current;state.selected[i]=null;state.done[i]=false;state.tried[i]=false;state.shown[i]=false;state.attempts[i]=0;render()}
function next(){if(state.current<QUESTIONS.length-1){state.current++;render()}else showFinish()}
function showFinish(){const correct=state.done.filter(Boolean).length;$("finishSummary").textContent=`你完成了 ${correct} / ${QUESTIONS.length} 题。没有完成的题仍可返回继续修改。`;$("finishCard").hidden=false}
function restart(){state.current=0;["selected","done","tried","shown","attempts"].forEach(k=>{const fill=k==="selected"?null:k==="attempts"?0:false;state[k]=Array(QUESTIONS.length).fill(fill)});render()}
function speak(){const q=QUESTIONS[state.current];if(!("speechSynthesis" in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(q.speak||q.prompt);u.lang="en-US";u.rate=.85;window.speechSynthesis.speak(u)}
$("checkBtn").addEventListener("click",check);$("showBtn").addEventListener("click",showAnswer);$("resetBtn").addEventListener("click",resetQuestion);$("prevBtn").addEventListener("click",()=>{if(state.current>0){state.current--;render()}});$("nextBtn").addEventListener("click",next);$("listenBtn").addEventListener("click",speak);$("restartBtn").addEventListener("click",restart);
buildJumpbar();render();
</script>
</body>
</html>
