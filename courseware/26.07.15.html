<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>句子骨架与句型变身｜课堂即时练习</title>
<link rel="stylesheet" href="26.07.15.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="title-wrap">
      <div class="logo">🧩</div>
      <div>
        <h1>句子骨架与句型变身</h1>
        <div class="subtitle">先看清句子，再判断类型，再完成变形与扩写</div>
      </div>
    </div>
    <div class="top-status">
      <div class="module-pill" id="modulePill">句子扫描</div>
      <div class="progress-pill" id="progressPill">1 / 18</div>
    </div>
  </header>

  <nav class="jumpbar" id="jumpbar" aria-label="题目跳转"></nav>

  <main class="stage" id="stage"></main>

  <footer class="controls">
    <button class="btn ghost" id="prevBtn">← 上一题</button>
    <button class="btn secondary" id="resetBtn">重做本题</button>
    <div class="control-note" id="controlNote">完成操作后点击“检查”</div>
    <button class="btn primary" id="checkBtn">检查</button>
    <button class="btn next" id="nextBtn">下一题 →</button>
  </footer>
</div>
<script src="26.07.15-data.js"></script>
<script src="26.07.15-app.js"></script>
</body>
</html>
