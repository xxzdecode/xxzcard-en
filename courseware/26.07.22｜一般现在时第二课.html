<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一般现在时｜否定句与一般疑问句随堂练习</title>
<style>
:root{--page-bg:#fff4f7;--panel:#fffdfc;--title:#d97892;--mint:#a8d8c8;--mint-deep:#397c69;--mint-soft:#dff3ea;--knowledge:#fff0c9;--line:#efdde4;--text:#625b63;--muted:#81747c;--correct:#d7f3dc;--wrong:#ffd9d9;--feedback-height:52px;--tap:46px}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--page-bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;-webkit-text-size-adjust:100%}
button{font:inherit;min-height:var(--tap);cursor:pointer}button:focus-visible{outline:3px solid #f3b6c7;outline-offset:2px}
.practice-app{width:100vw;height:100dvh;overflow:hidden;display:grid;grid-template-rows:auto minmax(0,1fr) var(--feedback-height);gap:10px;padding:max(9px,env(safe-area-inset-top)) max(9px,env(safe-area-inset-right)) max(9px,env(safe-area-inset-bottom)) max(9px,env(safe-area-inset-left))}
.practice-header{display:grid;grid-template-columns:minmax(180px,auto) minmax(0,1fr) auto;align-items:center;gap:10px;min-width:0;padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 24px rgba(220,170,180,.14)}
h1{margin:0;color:var(--title);font-size:clamp(21px,2.4vw,31px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.knowledge-strip{min-width:0;display:flex;gap:6px;flex-wrap:wrap;max-height:64px;overflow:hidden}.knowledge-chip{padding:5px 9px;border-radius:999px;background:var(--knowledge);font-size:clamp(12px,1.25vw,15px);font-weight:700;white-space:nowrap}
.header-actions{display:flex;gap:7px;align-items:center}.progress{padding:8px 12px;border-radius:999px;background:var(--mint-soft);color:var(--mint-deep);font-weight:900;white-space:nowrap}
.action{border:0;border-radius:999px;padding:8px 14px;background:var(--mint);color:#fff;font-weight:800}.action.secondary{color:var(--mint-deep);background:var(--mint-soft)}
.practice-stage{min-width:0;min-height:0;overflow:hidden;display:grid;place-items:center;padding:clamp(12px,2vw,24px);background:var(--panel);border:1px solid var(--line);border-radius:24px}
.question-card{width:min(920px,100%);max-height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:12px}.category{margin:0;color:var(--muted);font-weight:800}
.prompt-context{display:grid;gap:7px;min-height:0}.prompt{margin:0;font-size:clamp(21px,3vw,35px);line-height:1.35;overflow-wrap:anywhere;white-space:pre-line}
.source-line,.rule-line{border-radius:14px;padding:8px 12px;overflow-wrap:anywhere}.source-line{background:#fff8ef;font-size:clamp(16px,1.8vw,21px);font-weight:800}.rule-line{background:var(--knowledge);color:var(--muted);font-size:clamp(13px,1.35vw,16px);font-weight:700}
.options{min-height:0;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.option{min-width:0;border:2px solid var(--line);border-radius:16px;padding:10px 14px;background:#fff8fb;color:var(--text);font-weight:800;font-size:clamp(16px,2vw,22px);overflow-wrap:anywhere}
.option[aria-pressed="true"]{border-color:#e88fa3;background:#fff0f5}.option.correct-option{border-color:#6bb985;background:var(--correct)}.option.wrong-option{border-color:#e28a8a;background:var(--wrong)}
.question-actions{display:flex;justify-content:center;gap:9px}.feedback{height:var(--feedback-height);min-width:0;display:flex;align-items:center;gap:8px;padding:7px 14px;border:1px solid var(--line);border-radius:17px;background:var(--panel);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.feedback.correct{background:var(--correct)}.feedback.wrong{background:var(--wrong)}
.completion{border:0;border-radius:22px;padding:24px;color:var(--text);background:var(--panel);box-shadow:0 20px 60px rgba(80,55,70,.25);text-align:center}.completion::backdrop{background:rgba(80,55,70,.25)}
@media (orientation:landscape) and (max-height:520px){:root{--feedback-height:40px;--tap:38px}.practice-app{gap:6px;padding:6px}.practice-header{padding:5px 8px;border-radius:15px}.knowledge-strip{max-height:40px;gap:4px}.knowledge-chip{padding:3px 6px;font-size:11px}.progress,.action{padding:5px 9px;font-size:12px}.practice-stage{padding:8px;border-radius:17px}.question-card{gap:6px}.prompt{font-size:clamp(18px,3vw,25px)}.options{gap:6px}.option{padding:5px 8px;border-radius:11px;font-size:14px}.feedback{padding:4px 10px;border-radius:12px;font-size:12px}}
@media (orientation:portrait) and (max-width:767px){.practice-app{position:fixed;left:0;top:100dvh;width:100dvh;height:100vw;transform:rotate(-90deg);transform-origin:top left}}
</style>
</head>
<body>
<div class="practice-app">
<header class="practice-header"><h1 id="pageTitle"></h1><div class="knowledge-strip" id="knowledgeStrip" aria-label="知识摘要"></div><div class="header-actions"><span class="progress" id="progressText" aria-live="polite"></span><button class="action" id="newRoundButton" type="button">换一组</button></div></header>
<main class="practice-stage"><section class="question-card" aria-live="polite"><p class="category" id="categoryText"></p><div class="prompt-context"><div class="source-line" id="sourceLine" hidden></div><h2 class="prompt" id="promptText"></h2><div class="rule-line" id="ruleLine" hidden></div><div class="options" id="options"></div></div><div class="question-actions"><button class="action" id="checkButton" type="button">检查答案</button><button class="action secondary" id="showAnswerButton" type="button">显示答案</button><button class="action secondary" id="nextButton" type="button" disabled>下一题</button></div></section></main>
<footer class="feedback" id="feedback" aria-live="polite">△ 请选择答案。</footer>
</div>
<dialog class="completion" id="completionDialog" data-complete="false"><h2>本轮完成</h2><p id="completionText"></p><button class="action" id="restartButton" type="button">再来一轮</button></dialog>
<script id="practice-data" type="application/json">{"version":2,"title":"一般现在时｜否定句与一般疑问句随堂练习","knowledge":["don't / doesn't + 动词原形","Do / Does + 主语 + 动词原形"],"completion":"随堂练习完成｜你完成了 20 题。先判断主语，再选择 do / does 或 don't / doesn't，后面的动词使用原形。","round":{"size":20,"shuffle":false,"quotas":{"recognition":4,"negative":8,"question":8}},"scope":{"mode":"declared","allowedWords":[]},"questions":[{"id":"CP01","category":"recognition","categoryLabel":"识别规则","type":"single","prompt":"___ you play basketball after school?","options":["Do","Does","Is","Are"],"answer":"Do","wrongFeedback":"you 与 do 搭配。","explanation":"I / you / we / they 构成疑问句时用 Do。"},{"id":"CP02","category":"recognition","categoryLabel":"识别规则","type":"single","prompt":"___ your sister read before bed?","options":["Do","Does","Is","Has"],"answer":"Does","wrongFeedback":"your sister 是单数，相当于 she。","explanation":"he / she / it / 单数名词构成疑问句时用 Does。"},{"id":"CP03","category":"recognition","categoryLabel":"识别规则","type":"single","prompt":"We ___ watch TV in the morning.","options":["don't","doesn't","aren't","isn't"],"answer":"don't","wrongFeedback":"We 与 don't 搭配。","explanation":"I / you / we / they + don't + 动词原形。"},{"id":"CP04","category":"recognition","categoryLabel":"识别规则","type":"single","prompt":"The dog ___ sleep in my room.","options":["don't","doesn't","isn't","not"],"answer":"doesn't","wrongFeedback":"The dog 是单数，相当于 it。","explanation":"he / she / it / 单数名词 + doesn't + 动词原形。"},{"id":"CP05","category":"negative","categoryLabel":"肯定变否定","type":"single","source":"I play football every Saturday.","prompt":"选择正确否定句。","rule":"（I + don't + 动词原形）","options":["I don't play football every Saturday.","I doesn't play football every Saturday.","I am not play football every Saturday.","I don't plays football every Saturday."],"answer":"I don't play football every Saturday.","wrongFeedback":"don't 后使用动词原形 play。","explanation":"主语 I 用 don't，实义动词保持原形。"},{"id":"CP06","category":"negative","categoryLabel":"肯定变否定","type":"single","source":"She likes apples.","prompt":"选择正确否定句。","rule":"（doesn't 已承担三单变化，like 用原形）","options":["She doesn't like apples.","She don't like apples.","She doesn't likes apples.","She isn't like apples."],"answer":"She doesn't like apples.","wrongFeedback":"出现 doesn't 后，likes 必须还原成 like。","explanation":"否定句结构为 She + doesn't + like + ..."},{"id":"CP07","category":"negative","categoryLabel":"特殊三单还原","type":"single","source":"Tom has lunch at school.","prompt":"选择正确否定句。","rule":"（has → have；doesn't 后用原形）","options":["Tom doesn't have lunch at school.","Tom doesn't has lunch at school.","Tom don't have lunch at school.","Tom isn't have lunch at school."],"answer":"Tom doesn't have lunch at school.","wrongFeedback":"has 的原形是 have。","explanation":"Tom 用 doesn't；助动词出现后，实义动词还原为 have。"},{"id":"CP08","category":"negative","categoryLabel":"否定句纠错","type":"single","source":"My mother doesn't watches TV at night.","prompt":"选择正确改法。","options":["My mother doesn't watch TV at night.","My mother don't watches TV at night.","My mother isn't watch TV at night.","My mother doesn't watching TV at night."],"answer":"My mother doesn't watch TV at night.","wrongFeedback":"doesn't 后不能再使用 watches。","explanation":"三单变化只保留在 doesn't 上，后面用原形 watch。"},{"id":"CP09","category":"question","categoryLabel":"一般疑问句","type":"single","source":"They go to school by bus.","prompt":"选择正确一般疑问句。","rule":"（Do + they + 动词原形）","options":["Do they go to school by bus?","Does they go to school by bus?","Are they go to school by bus?","Do they goes to school by bus?"],"answer":"Do they go to school by bus?","wrongFeedback":"they 用 Do，动词保持原形。","explanation":"一般疑问句结构为 Do + 主语 + 动词原形 + ...?"},{"id":"CP10","category":"question","categoryLabel":"一般疑问句","type":"single","source":"He plays chess after dinner.","prompt":"选择正确一般疑问句。","rule":"（Does 已承担三单变化，play 用原形）","options":["Does he play chess after dinner?","Do he play chess after dinner?","Does he plays chess after dinner?","Is he play chess after dinner?"],"answer":"Does he play chess after dinner?","wrongFeedback":"问句中使用 Does 后，plays 还原为 play。","explanation":"结构为 Does + he + play + ...?"},{"id":"CP11","category":"question","categoryLabel":"简短回答","type":"single","prompt":"Do Lily and Amy study English after school?","options":["Yes, they do.","Yes, they does.","Yes, they are.","Yes, she does."],"answer":"Yes, they do.","wrongFeedback":"问句用 Do，回答也用 do；两个人用 they。","explanation":"Lily and Amy 相当于 they，简短肯定回答为 Yes, they do."},{"id":"CP12","category":"question","categoryLabel":"简短回答","type":"single","prompt":"Does Amy get up at six?","options":["No, she doesn't.","No, she don't.","No, she isn't.","No, Amy doesn't gets."],"answer":"No, she doesn't.","wrongFeedback":"问句使用 Does，否定回答使用 doesn't。","explanation":"简短回答不重复实义动词：No, she doesn't."},{"id":"CP13","category":"negative","categoryLabel":"肯定变否定","type":"single","source":"Ben goes to the library on Sundays.","prompt":"选择正确否定句。","rule":"（doesn't 后 go 用原形）","options":["Ben doesn't go to the library on Sundays.","Ben don't go to the library on Sundays.","Ben doesn't goes to the library on Sundays.","Ben isn't go to the library on Sundays."],"answer":"Ben doesn't go to the library on Sundays.","wrongFeedback":"Ben 是单数，用 doesn't；goes 还原为 go。","explanation":"结构为 Ben + doesn't + go + ..."},{"id":"CP14","category":"negative","categoryLabel":"否定句判断","type":"single","prompt":"选择正确的否定句。","options":["The children don't eat lunch at home.","The children doesn't eat lunch at home.","The children aren't eat lunch at home.","The children don't eats lunch at home."],"answer":"The children don't eat lunch at home.","wrongFeedback":"The children 是复数，用 don't，后接 eat 原形。","explanation":"复数主语 + don't + 动词原形。"},{"id":"CP15","category":"negative","categoryLabel":"否定句纠错","type":"single","source":"Lucy doesn't studies Chinese after school.","prompt":"选择正确改法。","options":["Lucy doesn't study Chinese after school.","Lucy don't study Chinese after school.","Lucy doesn't studies Chinese after school.","Lucy isn't study Chinese after school."],"answer":"Lucy doesn't study Chinese after school.","wrongFeedback":"doesn't 后的 studies 必须还原为 study。","explanation":"助动词承担三单变化，实义动词使用原形。"},{"id":"CP16","category":"negative","categoryLabel":"特殊三单还原","type":"single","source":"Our teacher has a red bag.","prompt":"选择正确否定句。","options":["Our teacher doesn't have a red bag.","Our teacher doesn't has a red bag.","Our teacher don't have a red bag.","Our teacher isn't have a red bag."],"answer":"Our teacher doesn't have a red bag.","wrongFeedback":"has 的原形是 have。","explanation":"单数主语用 doesn't，后面的 has 还原为 have。"},{"id":"CP17","category":"question","categoryLabel":"一般疑问句","type":"single","source":"My parents work in a hospital.","prompt":"选择正确一般疑问句。","options":["Do my parents work in a hospital?","Does my parents work in a hospital?","Are my parents work in a hospital?","Do my parents works in a hospital?"],"answer":"Do my parents work in a hospital?","wrongFeedback":"My parents 是复数，用 Do，work 保持原形。","explanation":"结构为 Do + 复数主语 + 动词原形 + ...?"},{"id":"CP18","category":"question","categoryLabel":"一般疑问句","type":"single","source":"Kate washes her hands before lunch.","prompt":"选择正确一般疑问句。","options":["Does Kate wash her hands before lunch?","Do Kate wash her hands before lunch?","Does Kate washes her hands before lunch?","Is Kate wash her hands before lunch?"],"answer":"Does Kate wash her hands before lunch?","wrongFeedback":"Kate 是单数，用 Does；washes 还原为 wash。","explanation":"结构为 Does + Kate + wash + ...?"},{"id":"CP19","category":"question","categoryLabel":"简短回答","type":"single","prompt":"Do you read English every day?","options":["Yes, I do.","Yes, I does.","Yes, I am.","Yes, you do."],"answer":"Yes, I do.","wrongFeedback":"Do 开头的问句用 do 回答；you 问 I 答。","explanation":"简短肯定回答为 Yes, I do."},{"id":"CP20","category":"question","categoryLabel":"一般疑问句纠错","type":"single","source":"Does the boy runs fast?","prompt":"选择正确改法。","options":["Does the boy run fast?","Do the boy run fast?","Does the boy runs fast?","Is the boy run fast?"],"answer":"Does the boy run fast?","wrongFeedback":"Does 后 runs 必须还原为 run。","explanation":"Does 已承担三单变化，后面的动词用原形。"}]}</script>
<script>
(()=>{"use strict";
const config=JSON.parse(document.getElementById("practice-data").textContent),byId=id=>document.getElementById(id);
const ui={title:byId("pageTitle"),knowledge:byId("knowledgeStrip"),progress:byId("progressText"),category:byId("categoryText"),prompt:byId("promptText"),source:byId("sourceLine"),rule:byId("ruleLine"),options:byId("options"),check:byId("checkButton"),show:byId("showAnswerButton"),next:byId("nextButton"),feedback:byId("feedback"),dialog:byId("completionDialog"),completion:byId("completionText")};
const state={round:[],index:0,selected:null,solved:[],revealed:[],attempts:[],firstTry:[]};
function feedback(type,message){ui.feedback.className=`feedback ${type||""}`.trim();ui.feedback.textContent=`${type==="correct"?"✓":type==="wrong"?"×":"△"} ${message}`}
function renderQuestion(){const q=state.round[state.index];state.selected=null;ui.progress.textContent=`第 ${state.index+1} / ${state.round.length} 题`;ui.category.textContent=q.categoryLabel||q.category;ui.prompt.textContent=q.prompt;ui.source.hidden=!q.source;ui.source.textContent=q.source||"";ui.rule.hidden=!q.rule;ui.rule.textContent=q.rule||"";ui.options.replaceChildren(...q.options.map((option,index)=>{const button=document.createElement("button");button.type="button";button.className="option";button.dataset.optionIndex=String(index);button.setAttribute("aria-pressed","false");button.textContent=option;button.addEventListener("click",()=>{if(state.solved[state.index])return;state.selected=index;ui.options.querySelectorAll(".option").forEach(item=>item.setAttribute("aria-pressed",String(Number(item.dataset.optionIndex)===index)));feedback("","已选择，点击“检查答案”。")});return button}));ui.next.disabled=true;ui.check.disabled=false;ui.show.disabled=false;feedback("","请选择答案。")} 
function startRound(){state.round=config.questions.slice(0,config.round.size);state.index=0;state.selected=null;state.solved=Array(state.round.length).fill(false);state.revealed=Array(state.round.length).fill(false);state.attempts=Array(state.round.length).fill(0);state.firstTry=Array(state.round.length).fill(false);ui.dialog.dataset.complete="false";if(ui.dialog.open)ui.dialog.close();renderQuestion()}
function checkAnswer(){if(state.selected===null)return feedback("wrong","请先选择答案。");if(state.solved[state.index])return;const q=state.round[state.index];state.attempts[state.index]+=1;const selected=q.options[state.selected];if(selected===q.answer){state.solved[state.index]=true;state.firstTry[state.index]=state.attempts[state.index]===1&&!state.revealed[state.index];ui.options.children[state.selected].classList.add("correct-option");feedback("correct",`正确。${q.explanation||""}`);ui.check.disabled=true;ui.show.disabled=true;ui.next.disabled=false}else{ui.options.children[state.selected].classList.add("wrong-option");feedback("wrong",q.wrongFeedback||"再看助动词、主语和动词原形。");state.selected=null;ui.options.querySelectorAll(".option").forEach(item=>item.setAttribute("aria-pressed","false"))}}
function showAnswer(){const q=state.round[state.index];state.revealed[state.index]=true;state.solved[state.index]=true;const answerIndex=q.options.indexOf(q.answer);if(answerIndex>=0)ui.options.children[answerIndex].classList.add("correct-option");feedback("correct",`答案：${q.answer}。${q.explanation||""}`);ui.check.disabled=true;ui.show.disabled=true;ui.next.disabled=false}
function nextQuestion(){if(state.index+1<state.round.length){state.index+=1;renderQuestion();return}const first=state.firstTry.filter(Boolean).length,final=state.solved.filter(Boolean).length;ui.completion.textContent=`${config.completion} 首次正确 ${first} / ${state.round.length}，最终正确 ${final} / ${state.round.length}。`;ui.dialog.dataset.complete="true";if(typeof ui.dialog.showModal==="function")ui.dialog.showModal();else ui.dialog.setAttribute("open","")}
ui.title.textContent=config.title;ui.knowledge.replaceChildren(...config.knowledge.map(text=>{const chip=document.createElement("span");chip.className="knowledge-chip";chip.textContent=text;return chip}));
byId("newRoundButton").addEventListener("click",startRound);byId("restartButton").addEventListener("click",startRound);ui.check.addEventListener("click",checkAnswer);ui.show.addEventListener("click",showAnswer);ui.next.addEventListener("click",nextQuestion);
window.__LESSON_PREP_QA__={state:()=>({index:state.index,total:state.round.length,complete:ui.dialog.dataset.complete==="true"}),solveCurrent:()=>{const q=state.round[state.index];state.selected=q.options.indexOf(q.answer);ui.options.querySelectorAll(".option").forEach(item=>item.setAttribute("aria-pressed",String(Number(item.dataset.optionIndex)===state.selected)))}};
startRound();
})();
</script>
</body>
</html>
